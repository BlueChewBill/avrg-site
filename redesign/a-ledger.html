<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AVRG — Direction A: The Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #f5f1e8;
    --ink: #1b1813;
    --faint: #8a8375;
    --rule: #1b1813;
    --serif: "Instrument Serif", Georgia, serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  ::selection { background: #1b1813; color: #f5f1e8; }
  img { display: block; max-width: 100%; }
  a { color: inherit; }

  .page { max-width: 1160px; margin: 0 auto; padding: 0 clamp(18px, 4vw, 48px); }

  /* ---- masthead ---- */
  .masthead {
    display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
    padding: 18px 0 14px; border-bottom: 2px solid var(--rule);
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  }
  .masthead .mid { color: var(--faint); }
  @media (max-width: 640px) { .masthead .mid { display: none; } }

  /* ---- hero ---- */
  .hero {
    display: grid; grid-template-columns: 1.15fr .85fr;
    gap: clamp(24px, 5vw, 64px);
    padding: clamp(40px, 8vh, 96px) 0 clamp(36px, 7vh, 80px);
    border-bottom: 1px solid var(--rule);
    align-items: center;
  }
  @media (max-width: 760px) { .hero { grid-template-columns: 1fr; } }
  .hero h1 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(52px, 9vw, 118px);
    line-height: .95; letter-spacing: -0.01em;
  }
  .hero h1 em { font-style: italic; }
  .hero .lede {
    margin-top: 28px; max-width: 46ch;
    font-size: 13px; line-height: 1.85; color: #4c463b;
  }
  .hero .tagline {
    margin-top: 26px; font-size: 12px; font-style: italic; color: var(--faint);
    min-height: 20px; transition: opacity .45s ease;
  }
  .hero .tagline.out { opacity: 0; }
  .hero .tagline::before { content: "“"; } .hero .tagline::after { content: "”"; }

  .fig { position: relative; }
  .fig img.photo {
    width: 100%; aspect-ratio: 4/3; object-fit: cover;
    filter: saturate(1.04) contrast(1.02);
  }
  .fig figcaption {
    display: flex; justify-content: space-between;
    border-top: 1px solid var(--rule); margin-top: 10px; padding-top: 8px;
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--faint);
  }
  .stamp {
    position: absolute; top: -34px; right: -14px; width: 92px; height: 92px;
    mix-blend-mode: multiply; opacity: .92; transform: rotate(8deg);
    pointer-events: none;
  }
  @media (max-width: 760px) { .stamp { top: -20px; right: 2px; width: 74px; height: 74px; } }

  /* ---- index / contents ---- */
  .contents { padding: 26px 0 8px; border-bottom: 1px solid var(--rule); }
  .contents .head {
    font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--faint);
    margin-bottom: 14px;
  }
  .toc-row {
    display: flex; align-items: baseline; gap: 14px;
    padding: 13px 0; border-top: 1px dotted #b9b1a0;
    text-decoration: none; font-size: 14px;
  }
  .toc-row:hover .toc-title { font-style: italic; }
  .toc-num { font-size: 11px; color: var(--faint); width: 2.2em; }
  .toc-title { font-family: var(--serif); font-size: clamp(20px, 3vw, 27px); line-height: 1; }
  .toc-dots { flex: 1; border-bottom: 1px dotted #b9b1a0; transform: translateY(-4px); }
  .toc-count { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); white-space: nowrap; }

  /* ---- collection sections ---- */
  section.col { padding: clamp(44px, 8vh, 88px) 0 10px; }
  .col-head { border-bottom: 2px solid var(--rule); padding-bottom: 14px; margin-bottom: 8px; }
  .col-head .kicker {
    font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--faint);
    margin-bottom: 6px;
  }
  .col-head h2 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(34px, 6vw, 64px); line-height: 1;
    display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .col-head h2 .n { font-size: 13px; font-family: var(--mono); color: var(--faint); letter-spacing: .1em; }
  .col-desc {
    max-width: 60ch; font-size: 12.5px; line-height: 1.85; color: #4c463b;
    padding: 16px 0 30px;
  }

  .spec-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 34px 22px; padding-bottom: 26px;
  }
  @media (max-width: 560px) { .spec-grid { grid-template-columns: 1fr 1fr; gap: 26px 14px; } }
  .spec { text-decoration: none; }
  .spec .ph {
    aspect-ratio: 4/5; overflow: hidden; background: #14110e;
  }
  .spec .ph img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .5s cubic-bezier(.22,1,.36,1);
  }
  .spec:hover .ph img { transform: scale(1.035); }
  .spec .cap {
    display: flex; justify-content: space-between; gap: 8px; align-items: baseline;
    border-top: 1px solid var(--rule); margin-top: 9px; padding-top: 7px;
  }
  .spec .ref { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--faint); white-space: nowrap; }
  .spec .nm { font-family: var(--serif); font-size: 17px; line-height: 1.15; text-align: right; }

  .restock {
    padding: 44px 0 60px; font-size: 12px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--faint); font-style: italic;
  }

  /* ---- footer ---- */
  footer {
    margin-top: 60px; border-top: 2px solid var(--rule);
    padding: 34px 0 70px;
    display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  footer .dm { font-family: var(--serif); font-size: clamp(22px, 4vw, 34px); }
  footer .dm a { text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 5px; }
  footer .dm a:hover { font-style: italic; }
  footer .fine { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--faint); }
</style>
</head>
<body>
<div class="page">
  <header class="masthead">
    <span>AVRG</span>
    <span class="mid">Hand-shaped fingerboards</span>
    <span>Catalog — <span id="year">2026</span></span>
  </header>

  <div class="hero">
    <div>
      <h1>No two<br /><em>the same.</em></h1>
      <p class="lede" id="lede"></p>
      <p class="tagline" id="tagline"></p>
    </div>
    <figure class="fig">
      <img class="photo" id="hero-img" src="" alt="Dye-stack cross section of hand-shaped decks" />
      <img class="stamp" id="stamp" src="" alt="" aria-hidden="true" />
      <figcaption><span>Fig. 01</span><span>Dye-stack, cross section</span></figcaption>
    </figure>
  </div>

  <nav class="contents">
    <div class="head">Contents</div>
    <div id="toc"></div>
  </nav>

  <main id="sections"></main>

  <footer>
    <div class="dm" id="dm"></div>
    <div class="fine">AVRG · hand-made · no molds, no production line</div>
  </footer>
</div>

<script src="../site/data.js"></script>
<script>
(function () {
  const IMG = p => p ? "../site/" + p : "";
  const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));
  const roman = ["I", "II", "III", "IV", "V", "VI"];

  document.getElementById("hero-img").src = IMG(SITE.heroImage);
  document.getElementById("stamp").src = IMG(SITE.logo);
  document.getElementById("lede").textContent =
    SITE.brandText.replace(/^No two the same\.\s*/i, "");

  const handle = (typeof CONTACT === "object" && CONTACT.reddit) || "u/avrg";
  const rurl = "https://www.reddit.com/user/" + encodeURIComponent(handle.replace(/^\/?u\//i, ""));
  document.getElementById("dm").innerHTML =
    'Interested? DM <a href="' + rurl + '" target="_blank" rel="noopener">' + esc(handle) + "</a> on Reddit.";

  /* contents */
  document.getElementById("toc").innerHTML = COLLECTIONS.map((c, i) =>
    '<a class="toc-row" href="#' + c.id + '">' +
      '<span class="toc-num">' + String(i + 1).padStart(2, "0") + '</span>' +
      '<span class="toc-title">' + esc(c.title.replace(/ - /g, " · ")) + '</span>' +
      '<span class="toc-dots"></span>' +
      '<span class="toc-count">' + (c.boards.length ? c.boards.length + " boards" : "restocking") + '</span>' +
    '</a>'
  ).join("");

  /* sections */
  document.getElementById("sections").innerHTML = COLLECTIONS.map((c, i) => {
    const body = c.boards.length
      ? '<div class="spec-grid">' + c.boards.map((b, k) => {
          const ref = b.ref || (c.id.replace(/[^a-z]/gi, "").slice(0, 2).toUpperCase() + "-" + String(k + 1).padStart(2, "0"));
          return '<a class="spec" href="' + IMG(b.photos[0]) + '" target="_blank" rel="noopener">' +
            '<div class="ph"><img loading="lazy" src="' + IMG(b.thumb) + '" alt="' + esc(b.name || ref) + '"></div>' +
            '<div class="cap"><span class="ref">' + esc(ref) + '</span>' +
            (b.name ? '<span class="nm">' + esc(b.name) + '</span>' : '') + '</div>' +
          '</a>';
        }).join("") + '</div>'
      : '<div class="restock">Nothing on the bench — restocking.</div>';
    return '<section class="col" id="' + c.id + '">' +
      '<div class="col-head">' +
        '<div class="kicker">Collection ' + (roman[i] || i + 1) + '</div>' +
        '<h2>' + esc(c.title.replace(/ - /g, " · ")) + '<span class="n">' + esc(c.tagline) + '</span></h2>' +
      '</div>' +
      '<p class="col-desc">' + esc(c.description.replace(/ Hover.*$/, "")) + '</p>' +
      body +
    '</section>';
  }).join("");

  /* rotating tagline */
  const tags = SITE.taglines || [];
  let ti = 0;
  const tn = document.getElementById("tagline");
  tn.textContent = tags[0] || "";
  setInterval(() => {
    tn.classList.add("out");
    setTimeout(() => { ti = (ti + 1) % tags.length; tn.textContent = tags[ti]; tn.classList.remove("out"); }, 450);
  }, 4200);
})();
</script>
</body>
</html>
