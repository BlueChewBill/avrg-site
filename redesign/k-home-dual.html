<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AVRG — K: home, dual ground</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  /* K — home page, dual ground. h-blackout cloned, with a live black/white
     ground switch (bottom-right, persisted) — a working prototype of a site
     light/dark mode. Dark is the h-blackout baseline verbatim; light is the
     body.light override block at the end of this stylesheet, speaking the
     j-cards-white idiom (#fff ground, #000 max-contrast, #444 soft,
     #767676 hints). Engine and markup are otherwise identical to h. */
  /* Satoshi Black: the heading voice (approved in the Type & Button Lab
     mockup). One weight only — 46KB, shipped from site/fonts/. */
  @font-face {
    font-family: "Satoshi";
    src: url("../site/fonts/Satoshi-Black.otf") format("opentype");
    font-weight: 900;
    font-style: normal;
    font-display: swap;
  }
  :root {
    --bg: #000;
    --bone: #ddd1b6;
    --ink: #201a15;
    --soft: #c7bda4;
    --hint: #a29a89;
    --line: #6b6d71;
    --disp: "Bricolage Grotesque", -apple-system, sans-serif;
    --mono: "Space Mono", ui-monospace, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background-color: var(--bg); color: var(--bone);
    font-family: var(--disp); font-weight: 400;
    -webkit-font-smoothing: antialiased; overflow-x: hidden;
  }
  ::selection { background: var(--bone); color: var(--ink); }
  img, video { display: block; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

  .label {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase;
  }

  /* ---- top bar ---- */
  .topbar {
    position: sticky; top: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    gap: clamp(14px, 2.6vw, 30px);
    padding: 14px clamp(18px, 3vw, 40px);
    background-color: rgba(0, 0, 0, .86);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    border-bottom: 1px solid #1c1c1c;
  }
  .topbar .tab {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase;
    color: #fff; border: 2px solid #fff; border-radius: 8px;
    padding: 10px 14px;
    transition: background .15s ease, color .15s ease;
  }
  .topbar .tab:hover { background: #fff; color: #000; }
  .topbar .dm-mini { position: absolute; right: clamp(18px, 3vw, 40px); }
  .bar-brand {
    position: absolute; left: clamp(18px, 3vw, 40px);
    display: flex; align-items: center; cursor: pointer;
  }
  .bar-brand img { width: 38px; height: 38px; border-radius: 50%; }
  @media (max-width: 940px) {
    .topbar { justify-content: flex-start; gap: 8px; overflow-x: auto; scrollbar-width: none; }
    .topbar::-webkit-scrollbar { display: none; }
    .topbar .tab, .topbar .dm-mini, .topbar .bar-brand { flex: 0 0 auto; white-space: nowrap; }
    .topbar .tab { font-size: 8.5px; letter-spacing: .08em; padding: 8px 8px; }
    .topbar .dm-mini { position: static; margin-left: auto; padding: 8px 8px; font-size: 8.5px; letter-spacing: .08em; }
    .bar-brand { position: static; }
    .bar-brand img { width: 30px; height: 30px; }
  }

  /* ---- the split ---- */
  .split {
    display: grid; grid-template-columns: 324px 1fr;
    gap: 0 clamp(28px, 3.4vw, 52px);
    max-width: 1440px; margin: 0 auto;
    padding: clamp(22px, 3.6vh, 44px) clamp(18px, 3vw, 40px) 0;
  }
  .spine { align-self: start; }

  /* ---- spine: logo, taglines, video, pitch, ask ---- */
  .spine { text-align: center; }
  .masthead .brand { display: inline-block; cursor: pointer; }
  .masthead img { width: 150px; height: auto; margin: 0 auto; }
  /* fixed two-line box: swapping taglines never moves what's below.
     sits low, near the video, rather than tight under the logo */
  .tick { margin-top: clamp(36px, 8vh, 96px); color: #fff; line-height: 1.8; height: 36px; transition: opacity .45s ease; }
  .tick.out { opacity: 0; }
  .masthead .mono {
    margin-top: 14px;
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase; line-height: 1.7; color: var(--soft);
  }

  .video-wrap { margin-top: 16px; }
  .note {
    margin-top: 12px;
    font-size: 12.5px; font-style: italic; line-height: 1.6;
    color: var(--hint); text-align: center;
  }
  .made-note { margin-top: clamp(44px, 8vh, 72px); text-align: left; }
  .made-row {
    display: flex; align-items: flex-start; gap: 16px;
    margin-top: 12px; text-align: left;
  }
  .made-row figure { flex: 0 0 47%; margin: 0; }
  .made-row figure img {
    width: 100%; aspect-ratio: 5/4; object-fit: cover; border-radius: 6px;
    box-shadow: 0 0 0 2px var(--ink), 6px 8px 0 -1px rgba(32, 26, 21, .34);
  }
  .made-row .note { text-align: left; margin-top: 10px; }
  .made-row .pitch { margin: 0; flex: 1; }
  .video-wrap video, .vtile video {
    width: 100%; height: 100%; object-fit: cover; border-radius: 6px;
    box-shadow: 0 0 0 2px var(--ink), 9px 11px 0 -1px rgba(32, 26, 21, .34);
    background: #16120e;
  }
  .video-wrap video { aspect-ratio: 9/14; }

  .pitch {
    margin: 24px auto 0; max-width: 36ch; text-align: left;
    font-size: 14px; line-height: 1.8; color: var(--soft);
  }
  .spine-cta { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 20px; }
  .spine-cta .ask { color: var(--bone); }
  .dm-mini {
    display: inline-block; background: transparent; color: #fff;
    border: 2px solid #fff; border-radius: 8px;
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase;
    padding: 12px 16px;
    transition: background .15s ease, color .15s ease;
  }
  .dm-mini:hover { background: #fff; color: #000; }

  /* DM buttons wear the reserved glitch: a choppy slice-jitter on entry.
     every other button gets the quiet text decode (JS, same glyph set as
     the taglines). Class-driven, not :hover-driven — the clip-path slices
     punch holes in hit-testing mid-run, which a :hover animation reads as
     leave/re-enter and re-queues itself forever. The class also holds the
     inverted colors so the hover style can't flicker during the run. */
  .dm-mini.glitch-run, .lb-dm-btn.glitch-run {
    animation: dm-glitch .26s steps(1, end) 1;
    background: #fff; color: #000;
  }
  @keyframes dm-glitch {
    0%   { transform: translate(2px, -1px) skewX(-6deg); clip-path: inset(0 0 44% 0); }
    33%  { transform: translate(-2px, 1px) skewX(4deg);  clip-path: inset(52% 0 0 0); }
    66%  { transform: translate(1px, 0);                 clip-path: inset(14% 0 26% 0); }
    100% { transform: none; clip-path: none; }
  }

  /* ---- shop column: conveyor shelves ---- */
  .shop { min-width: 0; }
  section.band { padding: 0 0 clamp(26px, 4vh, 44px); }
  .bandhead {
    display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
    /* indented off the belt's left edge so the titles don't spotlight the
       boundary the shelf fade is there to soften */
    padding: 2px 4px 0 112px;
  }
  .band h2 {
    font-family: "Satoshi", var(--disp);
    font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; line-height: 1.05;
    font-size: clamp(22px, 2.3vw, 30px);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .band h2 .hl { color: #fff; }
  .bandsub { color: #fff; font-size: 12px; letter-spacing: .16em; }

  /* ---- card (shared with lightbox + grids) ---- */
  .frame {
    aspect-ratio: 4/5; overflow: hidden; border-radius: 6px;
    background: #16120e;
    box-shadow: 0 0 0 2px var(--ink), 7px 9px 0 -1px rgba(32, 26, 21, .34);
  }
  .frame img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  /* dual card: both sides of one board in a single frame */
  .frame.dual { display: flex; gap: 2px; }
  .frame.dual img { width: calc(50% - 1px); }
  /* belt cards: shadow x tracks position on the shelf (virtual light above shelf
     center) — --shx is set per-frame by the conveyor engine */
  .card .frame {
    box-shadow: 0 0 0 2px var(--ink), var(--shx, 7px) 9px 0 -1px rgba(32, 26, 21, .34);
  }
  .cap { margin-top: 12px; text-align: center; }
  .cap .nm { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }
  .cap .rf {
    display: block; margin-top: 4px;
    font-family: var(--mono); font-size: 8.5px; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase; color: #fff;
  }

  /* ---- conveyor ---- */
  .belt {
    position: relative; z-index: 0;
    margin-top: 14px; height: var(--beltH, 330px);
    overflow: hidden; cursor: grab; touch-action: pan-y;
    /* the shelf: gray band with long horizontal fades, feathered softly at the
       top and bottom (the vertical layer fades to page-black over the gray) */
    background:
      linear-gradient(180deg,
        rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0) 13%,
        rgba(0, 0, 0, 0) 87%, rgba(0, 0, 0, 1) 100%),
      linear-gradient(90deg,
        rgba(74, 74, 74, 0) 0%, rgba(74, 74, 74, 1) 18%,
        rgba(74, 74, 74, 1) 82%, rgba(74, 74, 74, 0) 100%);
  }
  .belt.dragging { cursor: grabbing; }
  .belt::before, .belt::after {
    content: ""; position: absolute; top: 0; bottom: 0; width: 8%; z-index: 5; pointer-events: none;
  }
  .belt::before { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
  .belt::after { right: 0; background: linear-gradient(to left, var(--bg), transparent); }
  .card {
    position: absolute; left: 0; top: 50%;
    width: var(--cardW, 172px); will-change: transform, opacity;
    user-select: none; -webkit-user-drag: none; cursor: pointer;
  }

  /* ---- mobile tile grid ---- */
  .tilegrid { display: none; }

  /* ---- collection page (unchanged from the current site) ---- */
  #colpage { max-width: 1240px; margin: 0 auto; }
  .colpage-inner { text-align: center; padding: clamp(30px, 5vh, 56px) 0 0; }
  .colpage-inner .back { display: inline-block; color: var(--hint); transition: color .15s ease; }
  .colpage-inner .back:hover { color: var(--bone); }
  /* the two small options under the centered title */
  .colpage-links {
    display: flex; justify-content: center; flex-wrap: wrap;
    gap: 12px 32px; margin-top: 18px; padding: 0 20px;
  }
  .colpage-inner h2 {
    display: inline-block; color: #fff;
    font-family: "Satoshi", var(--disp);
    font-weight: 900; text-transform: uppercase; letter-spacing: -0.025em; line-height: 1.04;
    font-size: clamp(34px, 6vw, 68px); margin: 8px 0 0; padding: 0 16px;
  }
  .colpage-inner .desc {
    max-width: 52ch; margin: 18px auto 0; padding: 0 20px;
    font-size: 15px; font-weight: 500; line-height: 1.8; color: var(--soft);
  }
  .shelfgrid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(min(232px, 42vw), 1fr));
    gap: 44px 32px; justify-items: center;
    max-width: 1240px; margin: 0 auto;
    padding: clamp(30px, 5vh, 52px) clamp(20px, 5vw, 64px) 40px;
  }
  .scard {
    width: min(232px, 58vw);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform .18s ease;
  }
  /* card hover choreography is pointer-only: iOS applies sticky :hover on
     tap, which fired the chip wipes as a truncated prelude to the lightbox.
     Every card :hover rule below sits in an (hover:hover) gate — touch gets
     its own scripts (lightbox n/N decode, dock flight) instead. */
  @media (hover: hover) { .scard:hover { transform: translateY(-4px); } }
  .restock {
    max-width: 420px; margin: 38px auto 0; padding: 40px 20px;
    border: 2.5px dashed var(--bone); border-radius: 14px; opacity: .5;
  }
  .colnav { margin-top: clamp(44px, 7vh, 72px); text-align: center; }
  .colnav-home {
    display: inline-flex; align-items: center; justify-content: center;
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--bone); color: var(--ink);
    box-shadow: 0 8px 28px rgba(0, 0, 0, .4);
    transition: transform .3s ease;
  }
  .colnav-home svg { transition: transform .3s ease; }
  .colnav-home:hover { transform: scale(1.06); }
  .colnav-home:hover svg { transform: rotate(-90deg); }
  .colnav-links {
    display: flex; justify-content: center; flex-wrap: wrap;
    gap: 14px; margin-top: 26px; padding: 0 20px;
  }
  .colnav-btn {
    background: transparent; color: #fff;
    border: 2px solid #fff; border-radius: 8px;
    padding: 13px 20px;
    transition: background .15s ease, color .15s ease;
  }
  .colnav-btn:hover { background: #fff; color: #000; }

  /* ---- shop all: collection pages stitched into one scroll ---- */
  .shopall-head { padding-bottom: 0; }
  .shopall-sec { padding-top: clamp(40px, 7vh, 80px); }
  .shopall-foot { padding-top: 0; }
  .shopall-foot .colnav { margin-top: clamp(28px, 5vh, 52px); padding-bottom: clamp(36px, 6vh, 64px); }

  /* ---- lightbox (unchanged) ---- */
  .lb { position: fixed; inset: 0; z-index: 5000; }
  .lb[hidden] { display: none; }
  .lb-scrim {
    position: absolute; inset: 0; background: rgba(24, 19, 14, .88);
    opacity: 0; transition: opacity .45s ease;
  }
  .lb.in .lb-scrim { opacity: 1; }
  .lb-card {
    position: absolute; left: 50%; top: 50%;
    width: min(380px, 82vw);
    translate: -50% -50%;
    will-change: transform;
    transition: transform .55s cubic-bezier(.22,1,.36,1);
  }
  .lb-card .frame {
    border-radius: 8px;
    box-shadow: 0 0 0 2.5px var(--bone), 0 34px 90px rgba(0, 0, 0, .6);
  }
  .lb-card .frame img { pointer-events: auto; cursor: pointer; object-fit: contain; }
  .lb-rest { opacity: 0; transition: opacity .4s ease .18s; }
  .lb.in .lb-rest { opacity: 1; }
  /* closing: the card flies home — thumbs/rest must not ride along */
  .lb:not(.in) .lb-rest { transition: opacity .1s ease; }
  .lb-thumbs { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
  .lb-thumbs:empty { display: none; }
  .lb-thumbs img {
    width: 54px; height: 54px; object-fit: cover; border-radius: 5px; cursor: pointer;
    box-shadow: 0 0 0 2px rgba(221, 209, 182, .5); transition: box-shadow .2s ease;
  }
  .lb-thumbs img.on { box-shadow: 0 0 0 3px var(--acc, #d8511f); }
  .lb-desc {
    max-width: 40ch; margin: 18px auto 0; white-space: pre-line; text-align: center;
    font-size: 13px; line-height: 1.75; color: #d6cbb2;
  }
  .lb-desc:empty { display: none; }
  .lb-product {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    margin-top: 16px; padding: 18px 16px;
    background: rgba(221, 209, 182, .08);
    border: 1px solid rgba(221, 209, 182, .28);
    border-radius: 10px; text-align: center;
  }
  .lb-product .nm {
    display: block; color: var(--bone);
    font-size: 14px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  }
  /* spec pill: identifier | dimensions */
  .lb-pill {
    display: inline-flex; align-items: stretch; overflow: hidden;
    border: 2px solid rgba(221, 209, 182, .55); border-radius: 999px;
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase; line-height: 1;
  }
  .lb-pill .seg { padding: 10px 16px 9px; }
  .lb-pill .ref { color: #fff; }
  .lb-pill .dims { color: var(--bone); border-left: 2px solid rgba(221, 209, 182, .55); }
  .lb-cta { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .lb-list-btn {
    font-family: var(--mono); font-size: 9.5px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
    color: var(--soft); border: 1.5px dashed rgba(221, 209, 182, .45);
    border-radius: 999px; padding: 9px 14px;
    transition: color .15s ease, border-color .15s ease;
  }
  .lb-list-btn:hover { color: #fff; border-color: #fff; }
  .lb-list-btn.on { color: var(--acc, #d8511f); border-style: solid; border-color: currentColor; }

  /* ---- my lisst page + inquiry form ---- */
  .lisst-empty {
    max-width: 420px; margin: 38px auto 0; padding: 40px 20px;
    border: 2.5px dashed var(--bone); border-radius: 14px; opacity: .5;
  }
  .lisst-card { position: relative; }
  .lisst-remove {
    position: absolute; top: -10px; right: -10px; z-index: 3;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--bone); color: var(--ink);
    font-family: var(--mono); font-size: 13px; font-weight: 700; line-height: 1;
    box-shadow: 0 4px 14px rgba(0, 0, 0, .5);
    transition: transform .15s ease;
  }
  .lisst-remove:hover { transform: scale(1.12); }
  .inq {
    max-width: 460px; margin: clamp(36px, 6vh, 60px) auto 0; padding: 0 20px;
    text-align: left;
  }
  .inq-head { text-align: center; color: #fff; }
  .inq-sub { margin-top: 10px; text-align: center; font-size: 12.5px; font-style: italic; color: var(--hint); }
  .inq label {
    display: block; margin: 18px 0 7px;
    font-family: var(--mono); font-size: 9.5px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase; color: var(--soft);
  }
  .inq input, .inq select, .inq textarea {
    width: 100%; background: transparent; color: var(--bone);
    border: 2px solid rgba(221, 209, 182, .4); border-radius: 8px;
    font-family: var(--disp); font-size: 14px; padding: 12px 13px;
    transition: border-color .15s ease;
  }
  .inq input:focus, .inq select:focus, .inq textarea:focus { outline: none; border-color: #fff; }
  .inq select { -webkit-appearance: none; appearance: none; cursor: pointer; }
  .inq select option { background: #111; color: var(--bone); }
  .inq textarea { resize: vertical; min-height: 90px; }
  .inq-send {
    display: block; margin: 24px auto 0;
    background: transparent; color: #fff;
    border: 2px solid #fff; border-radius: 8px; padding: 13px 22px;
    transition: background .15s ease, color .15s ease;
  }
  .inq-send:hover { background: #fff; color: #000; }
  .inq-status { margin-top: 14px; text-align: center; font-size: 13px; color: var(--soft); min-height: 1.4em; }
  .inq-or { margin-top: 26px; text-align: center; }
  .inq-or .dm-mini { margin-top: 10px; }
  .lb-cta-ask { color: var(--bone); }
  .lb-dm-btn {
    flex: 0 0 auto; background: transparent; color: #fff;
    border: 2px solid #fff; border-radius: 8px;
    padding: 12px 16px;
    transition: background .15s ease, color .15s ease;
  }
  .lb-dm-btn:hover { background: #fff; color: #000; }
  .lb-close {
    position: absolute; top: 74px; right: clamp(18px, 3.5vw, 40px); z-index: 3;
    color: var(--bone); opacity: .8; transition: opacity .15s ease;
  }
  .lb-close:hover { opacity: 1; }
  .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%); z-index: 3;
    font-family: var(--mono); font-size: 28px; line-height: 1;
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--bone); color: var(--ink);
    box-shadow: 0 8px 28px rgba(0, 0, 0, .5);
    opacity: .92;
    transition: opacity .15s ease, transform .15s ease;
  }
  .lb-nav:hover { opacity: 1; transform: translateY(-50%) scale(1.08); }
  .lb-prev { left: calc(50% - min(190px, 41vw) - 78px); }
  .lb-next { right: calc(50% - min(190px, 41vw) - 78px); }
  .lb-count {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 3;
    color: #a3967b;
  }
  @media (hover: none), (max-width: 720px) { .lb-nav { display: none; } }

  /* mobile lightbox: the card rides in a scrollable sheet instead of being
     pinned to viewport center — short phones (12 mini) can reach the buttons */
  @media (max-width: 720px) {
    /* the sheet starts below the (still-live) topbar and centers the card in
       what's left; margin:auto collapses to 0 on overflow, so tall content
       degrades to a plain scroll instead of clipping the top */
    .lb {
      overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
      top: var(--tbh, 0px); display: flex; flex-direction: column;
    }
    /* mobile fade = the site content itself goes to 0 over the page's own
       ground — no overlay at all. Every scrim variant banded at the iOS bar
       (fixed-inside-a-scroller mispins while the sheet scrolls; translucent
       tints read lighter behind the bar chrome). With the content invisible
       and the ground just being the page background, there is nothing to
       cover. The scrim element stays as an invisible tap-to-close target
       spanning the sheet's full scroll height (ids outrank the body.light
       scrim override below). */
    #lb-scrim, #vlb-scrim { position: absolute; inset: 0; height: auto; min-height: 100lvh; background: transparent; }
    .topbar, #home, #colpage { transition: opacity .45s ease; }
    /* header stays at full opacity and live — the sheet starts below it */
    body.lb-fade #home, body.lb-fade #colpage { opacity: 0; pointer-events: none; }
    /* the card is the hero on mobile — no text under it. Thumbs stay (photo
       nav); the corner chip's n/N decode already does the wayfinding the
       bottom count did. DM path on mobile = add to lisst -> #my-lisst. */
    .lb-desc, .lb-product, .lb-count { display: none; }
    .lb-card {
      position: relative; left: auto; top: auto; translate: none; z-index: 1;
      margin: auto;
      padding: 24px 0 calc(24px + env(safe-area-inset-bottom));
    }
    .lb-close { position: fixed; top: calc(var(--tbh, 0px) + 12px); right: 16px; z-index: 3; }
    .lb-count {
      position: fixed; bottom: calc(10px + env(safe-area-inset-bottom));
      pointer-events: none;
    }
  }

  /* ---- video lightbox: the spine video pulled forward like a card ---- */
  #vlb .lb-card {
    /* 9:16 is tall — the height term keeps the whole card on screen */
    width: min(340px, 78vw, calc((100vh - 240px) * 9 / 16));
    transition: transform .55s cubic-bezier(.22,1,.36,1), opacity .3s ease;
  }
  #vlb:not(.in) .lb-card { opacity: 0; }
  #vlb .frame { aspect-ratio: 9/16; }
  #vlb .frame video {
    width: 100%; height: 100%; object-fit: cover; border-radius: 8px;
  }
  .video-wrap video, .vtile video { cursor: pointer; }

  /* narrower desktops: slim the fixed columns, smaller cards, keep ~3 visible */
  @media (max-width: 1260px) and (min-width: 941px) {
    .split { grid-template-columns: 284px 1fr; }
    .belt { --cardW: 140px; --beltH: 286px; }
    .masthead img { width: 72px; height: 72px; }
  }

  /* ================= mobile: tiles instead of belts ================= */
  @media (max-width: 940px) {
    .split { display: flex; flex-direction: column; gap: 0; padding-top: 26px; }
    .shop { display: none; }

    .video-wrap { display: none; }
    .tilegrid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 22px 14px; margin-top: 24px; text-align: left;
    }
    .tile { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    /* the video tile keeps the old photo-frame look */
    .tile .tframe {
      aspect-ratio: 3/4; overflow: hidden; border-radius: 6px;
      background: #16120e;
      box-shadow: 0 0 0 2px var(--ink), 6px 8px 0 -1px rgba(32, 26, 21, .34);
    }
    .tile .tframe video { width: 100%; height: 100%; object-fit: cover; }
    /* collection card, frame-idiom lite: white ground on both page grounds
       (the collision is the point, same as the product cards) */
    .tile .tcard {
      position: relative; aspect-ratio: 3/4;
      background: #fff; border-radius: 8px;
      box-shadow: 6px 8px 0 -1px rgba(32, 26, 21, .34);
      display: flex; align-items: center; justify-content: center;
    }
    .tile .tcard::before {
      content: ""; position: absolute; inset: 9px;
      border: 1.5px solid #000; pointer-events: none;
    }
    .tile .tcard img {
      position: absolute; inset: 0; margin: auto;   /* iOS: see .d7f .stage img */
      width: 58%; height: 72%; object-fit: contain;
      filter: drop-shadow(5px 7px 5px rgba(0, 0, 0, .38));
    }
    .tile .tcount {
      position: absolute; top: 9px; left: 9px;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      letter-spacing: .1em; color: #fff; background: #000;
      padding: 4px 7px;
    }
    .tile .tnm {
      position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%);
      text-align: center;
      font-size: 19px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase;
      color: #000;
    }
    .tile .tsub {
      position: absolute; left: 0; right: 0; bottom: 16px;
      text-align: center;
      font-family: var(--mono); font-size: 8.5px; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase; color: #000;
    }
    .tile .tsub .tdot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--tacc); margin-right: 7px; vertical-align: 1px;
    }
    body.light .tile .tcard { box-shadow: 6px 8px 0 -1px rgba(32, 26, 21, .18); }
    .pitch { max-width: 44ch; }

    /* collection pages: boards surface two across instead of one.
       minmax(0,1fr): the proportion-locked card renders at 232px before its
       scale-down, and an auto-min track would balloon to that width */
    .shelfgrid {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 30px 14px;
      padding-left: 16px; padding-right: 16px;
    }
    .scard { width: min(232px, 100%); }
  }

  /* ================= card treatments (j finalists on the live engine) =================
     Ported from j-cards-white (.paper, .d7f frame v3) and j-cards-black
     (.d5 slab base + .d6z zoned), then made fluid — width 100%, square
     stage — so one card rides both the belt slots (--cardW) and the shelf
     grids. Treatments keep their own ground (paper/frame are white cards,
     zoned is a dark card) on BOTH page grounds; that collision is the
     point of the tool. */
  .wchip {
    display: inline-block;
    font-family: var(--mono); font-size: 8.5px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
    background: #fff; color: #000; border: none; border-radius: 0;
    padding: 5px 8px;
  }
  button.wchip { cursor: pointer; letter-spacing: .16em; padding: 6px 10px; transition: background .15s ease, color .15s ease; }
  @media (hover: hover) { button.wchip:hover { background: #000; color: #fff; box-shadow: 0 0 0 1.5px #fff; } }
  .bchip {
    display: inline-block;
    font-family: var(--mono); font-size: 8.5px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
    background: #000; color: #fff; border: none; border-radius: 0;
    padding: 5px 8px;
  }
  button.bchip { cursor: pointer; letter-spacing: .16em; padding: 6px 10px; transition: background .15s ease, color .15s ease; }
  @media (hover: hover) { button.bchip:hover { background: #fff; color: #000; box-shadow: 0 0 0 1.5px #000; } }
  .st {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 8.5px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
  }
  .st .dot { width: 7px; height: 7px; border-radius: 50%; }
  .st.avail { color: #58a852; } .st.avail .dot { background: #58a852; }
  .st.pend { color: #c98a12; } .st.pend .dot { background: #c98a12; animation: pulse 1.6s ease-in-out infinite; }
  .st.gone { color: #8b8175; } .st.gone .dot { background: #8b8175; }
  @keyframes pulse { 50% { opacity: .35; } }
  .spark { color: #d8511f; font-size: 12px; line-height: 1; cursor: help; }
  .sold { opacity: .55; }
  .sold:hover .stage img { transform: none !important; }
  .sold .wchip.rfc { text-decoration: line-through; }

  /* d5 slab base (zoned builds on it) */
  .d5 { width: 100%; cursor: pointer; }
  .d5 .panel {
    border-radius: 6px; background: #0b0b0b; overflow: hidden;
    box-shadow: 7px 9px 0 -1px rgba(255, 255, 255, .07), 7px 9px 0 0 rgba(0, 0, 0, .9);
    transition: box-shadow .22s ease;
  }
  @media (hover: hover) { .d5:hover .panel { box-shadow: 12px 15px 0 -1px rgba(255, 255, 255, .09), 12px 15px 0 0 rgba(0, 0, 0, .9); } }
  .d5 .stage {
    position: relative; height: auto; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .d5 .stage img {
    position: absolute; inset: 0; margin: auto;   /* iOS: see .d7f .stage img */
    max-height: 84%; max-width: 86%; width: auto; height: auto;
    filter: drop-shadow(7px 9px 0 rgba(0, 0, 0, .6));
    transition: transform .22s ease, filter .22s ease;
  }
  @media (hover: hover) { .d5:hover .stage img {
    transform: scale(1.07);
    filter: drop-shadow(11px 14px 0 rgba(0, 0, 0, .6));
  } }
  .d5 .info { padding: 11px 13px 13px; color: #fff; }
  .d5 .nm { font-size: 11.5px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; }
  .d5 .dims {
    margin-top: 5px; font-family: var(--mono); font-size: 8px;
    letter-spacing: .18em; text-transform: uppercase; color: #9a9a9a;
  }
  .d5 .r2 { display: flex; justify-content: space-between; align-items: center; margin-top: 9px; }
  .d5 .corner {
    position: absolute; top: 12px; left: 12px; z-index: 2;
    display: flex; align-items: center; gap: 7px;
  }
  .d5.spread .info { text-align: center; padding-top: 0; }
  .d5.spread .nm { display: block; }
  .d5.spread .r2 { margin-top: 12px; }
  .d5.sold .stage img { filter: grayscale(.7) drop-shadow(7px 9px 0 rgba(0, 0, 0, .4)); }

  /* zoned: grey plate stage inside a white-bordered black card */
  .d6z .panel { border: 2px solid #fff; background: #0b0b0b; }
  .d6z .plate { background: #a49d92; }
  .d6z .plate .nm { display: block; text-align: center; color: #16120e; padding-bottom: 15px; letter-spacing: .13em; }
  .d6z .plate .stage img { filter: drop-shadow(7px 9px 0 rgba(22, 18, 14, .45)); }
  @media (hover: hover) { .d6z:hover .plate .stage img { filter: drop-shadow(11px 14px 0 rgba(22, 18, 14, .45)); } }
  .d6z.sold .plate .stage img { filter: grayscale(.7) drop-shadow(7px 9px 0 rgba(22, 18, 14, .3)); }
  .d6z .info { padding-top: 12px; }
  .d6z .corner .wchip { box-shadow: 0 0 0 1.5px #16120e; }
  /* white ground: the white border vanishes on white — hold the edge in ink
     (tool adaptation, not part of the treatment) */
  body.light .d6z .panel { border-color: #000; }

  /* paper: white card, black border, ink text, black chips */
  .paper { width: 100%; cursor: pointer; }
  .paper .panel {
    border-radius: 6px; background: #fff; overflow: hidden;
    border: 2px solid #000;
    box-shadow: 7px 9px 0 -1px rgba(0, 0, 0, .85);
    transition: box-shadow .22s ease;
  }
  @media (hover: hover) { .paper:hover .panel { box-shadow: 12px 15px 0 -1px rgba(0, 0, 0, .85); } }
  .paper .stage {
    position: relative; height: auto; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .paper .stage img {
    position: absolute; inset: 0; margin: auto;   /* iOS: see .d7f .stage img */
    max-height: 84%; max-width: 86%; width: auto; height: auto;
    filter: drop-shadow(7px 9px 0 rgba(0, 0, 0, .3));
    transition: transform .22s ease, filter .22s ease;
  }
  @media (hover: hover) { .paper:hover .stage img {
    transform: scale(1.07);
    filter: drop-shadow(11px 14px 0 rgba(0, 0, 0, .3));
  } }
  .paper .corner {
    position: absolute; top: 12px; left: 12px; z-index: 2;
    display: flex; align-items: center; gap: 7px;
  }
  .paper .info { text-align: center; padding: 0 13px 13px; color: #000; }
  .paper .nm { display: block; font-size: 11.5px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; }
  .paper .dims {
    margin-top: 6px; font-family: var(--mono); font-size: 8px;
    letter-spacing: .18em; text-transform: uppercase; color: #000;
  }
  .paper .r2 { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }

  /* frame v3: the ⸺·⸺ card — flush chips wipe in from the frame edge,
     exits recede into the rails, whole card at half speed. Enter and exit
     animate on different axes, so BOTH are keyframes and the exit is armed
     by a JS-applied .left class (a transition can't pick up from an
     animation-held value; an unarmed exit would fire on page load). */
  .d7f { width: 100%; cursor: pointer; }
  .d7f .panel {
    position: relative; border-radius: 6px; background: #fff; overflow: hidden;
    border: 1.5px solid #000;
    box-shadow: 7px 9px 0 -1px rgba(0, 0, 0, .85);
    transition: box-shadow .44s ease;
    /* top room so the board sits optically centered — the caption zone
       weighs the bottom (~66px of chrome below the stage vs ~24px above
       the board without this) */
    padding-top: 52px;
  }
  @media (hover: hover) { .d7f:hover .panel { box-shadow: 12px 15px 0 -1px rgba(0, 0, 0, .85); } }
  .d7f .inframe { position: absolute; inset: 10px; z-index: 1; pointer-events: none; }
  .d7f .inframe::before, .d7f .inframe::after {
    content: ""; position: absolute; left: 0; width: calc(100% - 4px);
    height: 41%; border: 2px solid #000;
    transition: height .56s ease;
  }
  .d7f .inframe::before { top: 0; border-bottom: 0; }
  .d7f .inframe::after { bottom: 0; border-top: 0; }
  @media (hover: hover) { .d7f:hover .inframe::before, .d7f:hover .inframe::after { height: calc(50% - 6px); } }
  .d7f .dgl, .d7f .dgr {
    position: absolute; top: 50%; width: 5px; height: 5px; border-radius: 50%;
    background: #000; transform: translateY(-50%);
  }
  .d7f .dgl { left: -1.5px; }
  .d7f .dgr { right: -1.5px; }
  .d7f .inframe .ctl, .d7f .inframe .cbr { position: absolute; display: block; }
  .d7f .inframe .ctl { width: 4px; height: 4px; top: -1px; left: -1px; background: #000; }
  .d7f .inframe .cbr { width: 6px; height: 6px; bottom: -1px; right: -1px; background: #FF4655; }
  .d7f .stage {
    position: relative; height: auto; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .d7f .stage img {
    /* absolute + inset/margin centering: iOS Safari ignores %-max-height
       against an aspect-ratio (indefinite) height on in-flow children —
       abs-positioned children resolve % against the laid-out box instead */
    position: absolute; inset: 0; margin: auto;
    max-height: 79%; max-width: 78%; width: auto; height: auto;
    filter: drop-shadow(7px 9px 0 rgba(0, 0, 0, .3));
    transition: transform .44s ease, filter .44s ease;
  }
  @media (hover: hover) { .d7f:hover .stage img {
    transform: scale(1.07);
    filter: drop-shadow(11px 14px 0 rgba(0, 0, 0, .3));
  } }
  .d7f .corner {
    /* anchored to .stage, which now starts 52px down (panel top room) —
       -40px puts the chip back 12px from the PANEL top */
    position: absolute; top: -40px; left: 12px; z-index: 2;
    display: flex; align-items: center; gap: 7px;
  }
  .d7f .info { position: relative; z-index: 0; text-align: center; padding: 8px 28px 44px; color: #000; }
  .d7f .nm { display: block; font-size: 11.5px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; }
  .d7f .tspark { position: absolute; top: 13px; right: 14px; z-index: 2; }
  .d7f .fchip {
    position: relative; overflow: hidden;
    font-family: var(--mono); font-size: 8.5px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
    color: #000; background: none; border: none; border-radius: 0;
    padding: 6px 9px;
  }
  .d7f .fchip::before {
    content: ""; position: absolute; inset: 0; background: #000;
    transform: scaleY(0);
  }
  .d7f .fchip .ft { position: relative; z-index: 1; transition: color .2s ease .18s; }
  @media (hover: hover) { .d7f:hover .fchip .ft { color: #fff; } }
  button.d7f-cta { cursor: pointer; }
  .d7f .fc-ref::before { transform-origin: center top; }
  .d7f .fc-list {
    position: absolute; bottom: 12px; right: 12px; z-index: 2;
    letter-spacing: .16em; padding: 7px 10px;
  }
  /* static fill size: the want-word decode swaps labels of different
     lengths — the chip box (and its black fill) must never resize.
     Sized to the 6-char labels (+ List / Mine !) including the .16em
     letter-spacing each character carries. */
  .d7f .fc-list .ft { display: inline-block; min-width: calc(6ch + .96em); text-align: center; }
  .d7f .fc-list::before { transform-origin: center bottom; }
  .d7f.left .fchip::before { animation: chipdrop .36s ease; }
  @media (hover: hover) {
    .d7f:hover .fc-ref::before { transform-origin: left center; animation: chipwipe .44s ease forwards; }
    .d7f:hover .fc-list::before { transform-origin: right center; animation: chipwipe .44s ease forwards; }
  }
  @keyframes chipwipe {
    from { transform: scaleX(0) scaleY(1); }
    to   { transform: scale(1, 1); }
  }
  @keyframes chipdrop {
    from { transform: scale(1, 1); }
    to   { transform: scaleY(0); }
  }
  .d7f .fst {
    position: absolute; bottom: 14px; left: 14px; z-index: 2;
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 8.5px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
  }
  .d7f .fst .dot { width: 7px; height: 7px; border-radius: 50%; }
  .d7f .fst.avail { color: #3e7d3a; }
  .d7f .fst.avail .dot { background: #3e7d3a; }
  .d7f .fst.pend { color: #c98a12; }
  .d7f .fst.pend .dot { background: #c98a12; animation: pulse 1.6s ease-in-out infinite; }
  .d7f .fst.gone { color: #8b8175; }
  .d7f .fst.gone .dot { background: #8b8175; }
  .d7f .sttxt { min-height: 1em; }

  /* treatments are taller than the photo card — give the belt room */
  body:not([data-card="photo"]) .belt { --beltH: 356px; }
  @media (max-width: 1260px) and (min-width: 941px) {
    body:not([data-card="photo"]) .belt { --beltH: 306px; }
  }

  /* belt proportion pass: slots are ~2/3 of the 262px j card, so the
     furniture (chips, refs, statuses, paddings) scales by the same factor —
     reads a touch small by design; the board keeps its share of the stage */
  .card .wchip, .card .bchip { font-size: 6px; padding: 3.5px 6px; }
  .card button.wchip, .card button.bchip { padding: 4px 7px; }
  .card .st { font-size: 6px; gap: 4px; }
  .card .st .dot { width: 5px; height: 5px; }
  .card .spark { font-size: 9px; }
  .card .d5 .info, .card .paper .info { padding: 8px 10px 10px; }
  .card .paper .info { padding-top: 0; }
  .card .d5 .nm, .card .paper .nm, .card .d7f .nm { font-size: 8px; }
  .card .d5 .dims, .card .paper .dims { font-size: 6px; margin-top: 4px; }
  .card .d5 .r2, .card .paper .r2 { margin-top: 8px; }
  .card .d5 .corner, .card .paper .corner, .card .d7f .corner { top: 8px; left: 8px; gap: 5px; }
  .card .d7f .corner { top: -30px; }   /* 8px from panel top over the belt's 38px top room */
  .card .d6z .plate .nm { padding-bottom: 10px; }
  .card .d7f .panel { padding-top: 38px; }   /* 52px scaled to the belt's 172px slot */
  .card .d7f .inframe { inset: 7px; }
  .card .d7f .inframe::before, .card .d7f .inframe::after { border-width: 1.5px; }
  .card .d7f .dgl, .card .d7f .dgr { width: 4px; height: 4px; }
  .card .d7f .inframe .ctl { width: 3px; height: 3px; }
  .card .d7f .inframe .cbr { width: 5px; height: 5px; }
  .card .d7f .fchip { font-size: 6px; padding: 4px 6px; }
  .card .d7f .fc-list { bottom: 8px; right: 8px; padding: 4.5px 7px; }
  .card .d7f .fst { font-size: 6px; gap: 5px; bottom: 10px; left: 10px; }
  .card .d7f .fst .dot { width: 5px; height: 5px; }
  .card .d7f .info { padding: 6px 18px 30px; }
  .card .d7f .tspark { top: 9px; right: 10px; font-size: 9px; }

  /* ---- fv3 lightbox: the clicked full view IS the frame v3 card, blown up.
     Active only while the frame v3 treatment is selected — other treatments
     keep the stock lightbox. JS puts .fv3 on #lb and .d7f on #lb-card, so
     the card's own hover choreography (rails close, chips wipe, ref/name/
     status decode) runs on the big card through the existing delegated
     handlers; the extra chrome elements hide outside fv3 mode. */
  #lb:not(.fv3) .lb-fv3only { display: none; }
  #lb.fv3 .lb-card { width: min(430px, 84vw); }
  #lb.fv3 .lb-card .panel {
    position: relative; border-radius: 6px; background: #fff; overflow: hidden;
    border: 1.5px solid #000;
    box-shadow: 7px 9px 0 -1px rgba(0, 0, 0, .85), 0 34px 90px rgba(0, 0, 0, .4);
  }
  #lb.fv3 .lb-card .frame {
    aspect-ratio: 1; border-radius: 0; background: transparent; box-shadow: none;
  }
  #lb.fv3 .lb-card .frame img {
    padding: 44px 38px 12px;   /* top room mirrors the grid card's new balance */
    filter: drop-shadow(9px 11px 0 rgba(0, 0, 0, .3));
  }
  #lb.fv3 .inframe { inset: 12px; }
  #lb.fv3 .corner { top: 14px; left: 14px; }
  #lb.fv3 .fchip { font-size: 10.5px; padding: 8px 12px; }
  #lb.fv3 .fc-list { bottom: 14px; right: 14px; }
  #lb.fv3 .fst { font-size: 10px; bottom: 18px; left: 18px; }
  #lb.fv3 .fst .dot { width: 8px; height: 8px; }
  #lb.fv3 .lb-card .info { padding: 6px 44px 52px; }
  #lb.fv3 .lb-card .info .nm { font-size: 14px; }
  /* the frame card carries name/ref/status/list itself — slim the product
     box down to the DM cta */
  #lb.fv3 #lb-nm, #lb.fv3 .lb-pill, #lb.fv3 #lb-list-btn { display: none; }
  #lb.fv3 .lb-product { background: none; border: none; padding: 4px 0 0; }

  /* ---- fv3 nav: the ‹ › arrows live ON the card, facing the mid-rail dots.
     Square seat (decided 2026-07-20; empty circles clashed with the card's
     angular language). One gesture on card hover: rails close onto the dots,
     the line grows from each dot (.34s in), the seat draws as two
     half-rectangles splitting off the line and meeting at the far side
     (.46s in), then the seat fills LIKE A CHIP — black wipes in
     horizontally from the rail toward the card middle (chipwipe, .64s in)
     and the arrow flips white. On exit the fill drains vertically into the
     frame (chipdrop, armed by the same .left class the chips use; prev
     drains up, next drains down, keeping the card's diagonal pattern).
     Board + shadow growth spans the full ~.94s. Hovering the arrow itself
     inverts it (white fill, ink ring + glyph) — the +List answer. */
  #lb.fv3 .navfx {
    position: absolute; top: 50%; left: 12px; width: 62px; height: 40px;
    transform: translateY(-50%); z-index: 2; pointer-events: none;
    fill: none; stroke: #000; stroke-width: 2;
  }
  #lb.fv3 .navfx.rt { left: auto; right: 12px; transform: translateY(-50%) scaleX(-1); }
  #lb.fv3 .navfx .ln-s { stroke-dasharray: 15; stroke-dashoffset: 15; transition: stroke-dashoffset .12s ease; }
  #lb.fv3 .navfx .sq { stroke-dasharray: 52; stroke-dashoffset: 52; transition: stroke-dashoffset .18s ease; }
  #lb.fv3 .lb-card:hover .navfx .ln-s { stroke-dashoffset: 0; transition: stroke-dashoffset .14s ease .34s; }
  #lb.fv3 .lb-card:hover .navfx .sq { stroke-dashoffset: 0; transition: stroke-dashoffset .22s ease .46s; }
  #lb.fv3 .lb-fv3nav {
    position: absolute; top: 50%; z-index: 3;
    display: grid; place-items: center; overflow: hidden;
    width: 26px; height: 26px; margin-top: -13px; border-radius: 0;
    font-family: var(--mono); font-size: 15px; font-weight: 700; line-height: 1;
    color: #000; opacity: .45;
    transition: opacity .2s ease, box-shadow .15s ease;
  }
  #lb.fv3 .lb-fv3nav.prev { left: 28px; }   /* 12px inset + seat left edge 16 */
  #lb.fv3 .lb-fv3nav.next { right: 28px; }
  #lb.fv3 .lb-fv3nav::before {
    content: ""; position: absolute; inset: 0; background: #000;
    transform: scaleY(0);
  }
  #lb.fv3 .lb-fv3nav .ft { position: relative; z-index: 1; transition: color .15s ease; }
  #lb.fv3 .lb-card:hover .lb-fv3nav { opacity: 1; transition: opacity .2s ease .46s, box-shadow .15s ease; }
  #lb.fv3 .lb-card:hover .lb-fv3nav.prev::before { transform-origin: left center; animation: chipwipe .3s ease .64s forwards; }
  #lb.fv3 .lb-card:hover .lb-fv3nav.next::before { transform-origin: right center; animation: chipwipe .3s ease .64s forwards; }
  #lb.fv3 .lb-card:hover .lb-fv3nav .ft { color: #fff; transition: color .2s ease .78s; }
  #lb.fv3 .lb-card.left .lb-fv3nav.prev::before { transform-origin: center top; animation: chipdrop .36s ease; }
  #lb.fv3 .lb-card.left .lb-fv3nav.next::before { transform-origin: center bottom; animation: chipdrop .36s ease; }
  /* touch arrival (.tset, applied by openLb under the dock gate): the tap IS
     the hover — chip fills wipe in and the rails close while the card zooms,
     so it settles into the decoded state instead of arriving unfilled */
  #lb.fv3 .lb-card.tset .fc-ref::before { transform-origin: left center; animation: chipwipe .44s ease .22s forwards; }
  #lb.fv3 .lb-card.tset .fc-list::before { transform-origin: right center; animation: chipwipe .44s ease .22s forwards; }
  #lb.fv3 .lb-card.tset .fchip .ft { color: #fff; transition: color .2s ease .44s; }
  #lb.fv3 .lb-card.tset .inframe::before, #lb.fv3 .lb-card.tset .inframe::after { height: calc(50% - 6px); }
  #lb.fv3 .lb-card .lb-fv3nav:hover { opacity: 1; box-shadow: inset 0 0 0 1.5px #000; }
  #lb.fv3 .lb-card .lb-fv3nav:hover::before { background: #fff; }
  #lb.fv3 .lb-card .lb-fv3nav:hover .ft { color: #000; transition: color .1s ease; }
  #lb.fv3 .lb-prev, #lb.fv3 .lb-next { display: none; }
  @media (hover: none), (max-width: 720px) { #lb.fv3 .lb-fv3nav, #lb.fv3 .navfx { display: none; } }
  #lb.fv3 .lb-card .frame img { transition: transform .3s ease, filter .3s ease; }
  @media (hover: hover) { #lb.fv3 .lb-card:hover .frame img {
    transform: scale(1.08);
    filter: drop-shadow(13px 16px 0 rgba(0, 0, 0, .3));
    transition: transform .94s ease, filter .94s ease;
  } }

  /* ================= cart bay (sprint item 2) =================
     A card bay docked to the right screen edge, speaking fv3. At REST
     only the inner frame exists: two rail lines and the mid dot, floating
     on the page ground near the edge — a strange mark, not yet a card.
     On PROXIMITY the drawer starts its slow pull: the inner frame
     converges onto its dot while riding toward center screen; the outer
     frame's top and bottom lines emerge from the page edge and make
     their way to the outside edge; then the outside edge closes
     vertically onto itself (the face connecting echoes the inner
     gesture). The connected card keeps pulling — a slow drawer — until
     the bay is at full size. A CLICK anywhere on the drawer speeds it up
     and locks it in; the inner collapse arrow shuts it quickly; with no
     clicks, leaving lets the drawer slowly shut again. Marks are
     page-colored at rest (bone on black, ink on white) and flip to ink
     as the white body slides beneath them. The card shadow, count chip
     and status dot land with the face connection. +List sends the
     board's cutout flying onto a shelf (or onto the resting dot when
     closed, answered by a dot pulse). fv3 card mode only; hidden on
     touch/mobile.
     PROGRESS-DRIVEN: a JS rAF driver advances one master progress value
     p (0..1) and poses every piece from it each frame. The cursor is the
     motor — p always advances while in the trigger zone, but the RATE
     scales with proximity: parked at the outer bound it's a slow
     continuous crawl that completes on its own; closing the distance
     speeds the playback, so approaching feels like pulling the drawer
     yourself. Threshold classes fire off p (.inked marks-to-ink,
     .shadowed frame-complete → shadow/chip fade, .pulled shelf shadows,
     .fullish collapse arrow). Speed knobs live in the JS driver
     (BAY_TUNE); geometry knobs live here. */
  .bay {
    --bayW: 340px;
    --sliver: 62px;        /* drawer face position when the frame connects */
    --inner-rest: 4px;     /* rail's distance from the screen edge at rest */
    --inner-slide: 46px;   /* how far the inner frame rides toward center */
    --rp: 0;               /* rail-converge progress, written by the driver */
    --fp: 0;               /* face-draw progress, written by the driver */
    position: fixed; top: 50%; right: 0; height: 74vh; width: var(--bayW);
    transform: translateY(-50%); z-index: 5500; pointer-events: none;
  }
  body:not([data-card="framev3"]) .bay { display: none; }
  @media (hover: none), (max-width: 940px) { .bay { display: none; } }
  /* proximity is detected on document pointermove (not an overlay zone —
     an overlay would steal the belt's right-edge scroll acceleration);
     only the true card body captures clicks */
  .bay:not(.locked) .bay-panel { cursor: pointer; }
  /* stage-2 carrier: the pull from connected face to full drawer. The
     panel (stage 1) and the inner frame both ride it, so the connected
     card travels as one piece. All transforms are posed by the driver —
     no transitions on them. */
  .bay-drawer { position: absolute; inset: 0; will-change: transform; }
  /* the body: white fill with only top/bottom frame lines — sliding in
     from the page edge IS those lines making their way to the outside
     edge. The left (outside) edge is drawn separately by .bf-face. */
  .bay-panel {
    position: absolute; inset: 0; background: #fff;
    border: 0 solid #000; border-top-width: 1.5px; border-bottom-width: 1.5px;
    transform: translateX(calc(var(--bayW) + 10px));   /* parked off-page */
    transition: box-shadow .45s ease;
    box-shadow: -7px 9px 0 -1px rgba(0, 0, 0, 0);
    pointer-events: auto; will-change: transform;
  }
  /* the shadow waits for the frame to complete — .shadowed fires off p */
  .bay.shadowed .bay-panel { box-shadow: -7px 9px 0 -1px rgba(0, 0, 0, .85); }
  /* black ground: a black drop is invisible on the page — announce with the
     d5 idiom instead (faint white rim + solid black behind it) */
  body:not(.light) .bay.shadowed .bay-panel {
    box-shadow: -7px 9px 0 -1px rgba(255, 255, 255, .12), -7px 9px 0 0 rgba(0, 0, 0, .9);
  }
  /* the outside edge: two vertical halves closing onto themselves after
     the top/bottom lines arrive — the face connecting, echoing the inner */
  .bf-face { position: absolute; left: 0; top: -1.5px; bottom: -1.5px; width: 1.5px; pointer-events: none; }
  .bf-face::before, .bf-face::after {
    content: ""; position: absolute; left: 0; width: 1.5px; height: 50%;
    background: #000; transform: scaleY(var(--fp));
  }
  .bf-face::before { top: 0; transform-origin: center top; }
  .bf-face::after { bottom: 0; transform-origin: center bottom; }
  /* the inner frame: rails + dot, riding the drawer but sliding on its own.
     Marks are page-colored until the white body slides beneath (.inked). */
  .bay-inner {
    /* resting marks are trimmed ~3/4" top and bottom (82 = 10 + 72);
       the driver grows them back to full card height (10px) when the
       drawer assembles or a board is under inspection (the lean) */
    position: absolute; top: 82px; bottom: 82px; right: var(--inner-rest);
    width: 2px; z-index: 2; pointer-events: none;
    color: #000;
    transition: color .35s ease; will-change: transform;
  }
  body:not(.light) .bay-inner { color: var(--bone); }
  body:not(.light) .bay.inked .bay-inner { color: #000; }
  .bay-rail { position: absolute; inset: 0; }
  /* rails converge with --rp: height rides 41% → calc(50% - 6px) */
  .bay-rail::before, .bay-rail::after {
    content: ""; position: absolute; left: 0; width: 2px;
    height: calc(41% + var(--rp) * 9% - var(--rp) * 6px);
    background: currentColor;
  }
  .bay-rail::before { top: 0; }
  .bay-rail::after { bottom: 0; }
  .bay-dot {
    position: absolute; left: -1.5px; top: 50%; width: 5px; height: 5px;
    margin-top: -2.5px; border-radius: 50%; background: currentColor;
  }
  /* closed-bay receive: the dot answers the landing */
  @keyframes dotPulse { 0%, 100% { transform: scale(1); } 45% { transform: scale(2.4); } }
  .bay-inner.pulse .bay-dot { animation: dotPulse .5s ease; }
  /* chip + status arrive with the connection, not before */
  .bay-ref {
    position: absolute; top: 12px; left: 9px; z-index: 3;
    font-family: var(--mono); font-size: 8.5px; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    background: #000; color: #fff; padding: 4px 7px; pointer-events: none;
    opacity: 0; transition: opacity .4s ease;
  }
  .bay-st {
    position: absolute; bottom: 14px; left: 11px; z-index: 3; width: 7px; height: 7px;
    border-radius: 50%; background: #3e7d3a; pointer-events: none;
    opacity: 0; transition: opacity .4s ease;
  }
  .bay.shadowed .bay-ref, .bay.shadowed .bay-st {
    opacity: 1;
    transition: opacity .35s ease .15s;
  }
  .bay-st.none { background: #8b8175; }
  /* collapse arrow: the lightbox nav gesture rerun at the bay's mid dot,
     pointing back toward the screen edge. Transition-driven (enter and
     exit share the horizontal axis here, and the close slides everything
     off-screen anyway — no keyframe arming needed). */
  .bay-navfx {
    position: absolute; left: 9px; top: 50%; width: 62px; height: 40px;
    transform: translateY(-50%); fill: none; stroke: #000; stroke-width: 2;
    pointer-events: none;
  }
  .bay-navfx .ln-s { stroke-dasharray: 15; stroke-dashoffset: 15; transition: stroke-dashoffset .12s ease; }
  .bay-navfx .sq { stroke-dasharray: 52; stroke-dashoffset: 52; transition: stroke-dashoffset .18s ease; }
  /* the arrow earns its seat as the drawer nears full size (.fullish) */
  .bay.fullish .bay-navfx .ln-s { stroke-dashoffset: 0; transition: stroke-dashoffset .14s ease; }
  .bay.fullish .bay-navfx .sq { stroke-dashoffset: 0; transition: stroke-dashoffset .22s ease .12s; }
  .bay-close {
    position: absolute; left: 25px; top: 50%; margin-top: -13px; z-index: 2;
    display: grid; place-items: center; overflow: hidden;
    width: 26px; height: 26px;
    font-family: var(--mono); font-size: 15px; font-weight: 700; line-height: 1;
    color: #000; opacity: 0; pointer-events: none;
    transition: opacity .2s ease, box-shadow .15s ease;
  }
  .bay.fullish .bay-close { opacity: 1; pointer-events: auto; transition: opacity .2s ease .12s, box-shadow .15s ease; }
  .bay-close::before {
    content: ""; position: absolute; inset: 0; background: #000;
    transform: scaleX(0); transform-origin: left center; transition: transform .3s ease;
  }
  .bay.fullish .bay-close::before { transform: scaleX(1); transition: transform .3s ease .32s; }
  .bay-close .ft { position: relative; z-index: 1; transition: color .15s ease; }
  .bay.fullish .bay-close .ft { color: #fff; transition: color .2s ease .45s; }
  .bay.fullish .bay-close:hover { box-shadow: inset 0 0 0 1.5px #000; }
  .bay.fullish .bay-close:hover::before { background: #fff; transition-delay: 0s; }
  .bay.fullish .bay-close:hover .ft { color: #000; transition-delay: 0s; }
  /* shelves: four lines between the bay frame edge and the screen edge,
     each with a small faint shadow that fades in after the extend */
  .bay-shelves {
    position: absolute; left: 96px; right: 16px; top: 6%; bottom: 6%;
    display: grid; grid-template-rows: repeat(4, 1fr);
  }
  .bay-shelf { position: relative; display: flex; align-items: flex-end; gap: 10px; padding: 0 6px 6px; }
  .bay-shelf::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 2px;
    background: #000;
    box-shadow: 3px 4px 0 rgba(0, 0, 0, 0); transition: box-shadow .4s ease;
  }
  .bay.pulled .bay-shelf::after {
    box-shadow: 3px 4px 0 rgba(0, 0, 0, .15);
    transition-delay: calc(var(--i, 0) * .1s);
  }
  .bay-item {
    height: 52px; width: auto; cursor: pointer;
    filter: drop-shadow(3px 4px 0 rgba(0, 0, 0, .25));
    transition: transform .2s ease;
  }
  .bay-item:hover { transform: translateY(-3px) scale(1.06); }
  /* the flight: a cloned cutout riding from the card to the bay. Posed
     per-frame by the flight driver (position, scale, rotation, shadow all
     ride one progress value — same one-master-p lesson as the drawer);
     no transitions here on purpose. */
  .bay-fly {
    position: fixed; z-index: 6500; pointer-events: none;
    will-change: transform, filter;
  }
  /* seating: the real shelf item exists (hidden) from the moment the
     flight launches — the flight lands on its measured rect, then the
     item takes over in the same frame. No crossfade seam. */
  .bay-item.preseat { visibility: hidden; }
  /* Drop: last inches are a fall — touch, a whisper of squash, done */
  .bay-item.seat-drop { animation: seatDrop .2s cubic-bezier(.2, .8, .3, 1) both; transform-origin: bottom center; }
  @keyframes seatDrop {
    0%   { transform: translateY(-9px); }
    70%  { transform: translateY(0) scaleY(.965); }
    100% { transform: none; }
  }
  /* Skid: carried momentum — lands past the slot and friction drags it
     back into place along the shelf */
  .bay-item.seat-skid { animation: seatSkid .34s cubic-bezier(.12, .75, .15, 1) both; }
  @keyframes seatSkid {
    0%   { transform: translateX(19px) rotate(2deg); }
    100% { transform: none; }
  }
  /* Seatdraw's landing is a short, flat drop — the drawn seat line is
     the ceremony, the card just takes its chair */
  .bay-item.seat-set { animation: seatDrop .16s ease-out both; transform-origin: bottom center; }
  /* the seat line: a segment the slot draws under the incoming card
     (nav-arrow seat language — drawn, then filled, then part of the
     furniture). Sits on the shelf line and fades into it after landing. */
  .bay-seatline {
    position: absolute; bottom: -1px; height: 3px; background: #000;
    transform: scaleX(0); transform-origin: center;
    transition: transform .24s cubic-bezier(.3, .7, .25, 1);
  }
  .bay-seatline.drawn { transform: scaleX(1); }
  .bay-seatline.done { opacity: 0; transition: opacity .5s ease .15s; }
  /* the landing answered: the target shelf's shadow thunks darker for a
     beat, and the whole rack absorbs a couple px of the hit */
  .bay-shelf.landed::after { animation: shelfThunk .45s ease; }
  @keyframes shelfThunk {
    0% { box-shadow: 3px 4px 0 rgba(0, 0, 0, .15); }
    25% { box-shadow: 4px 5px 0 rgba(0, 0, 0, .4); }
    100% { box-shadow: 3px 4px 0 rgba(0, 0, 0, .15); }
  }
  .bay-shelves.recoil { animation: bayRecoil .2s ease; }
  @keyframes bayRecoil {
    30% { transform: translateX(3px); }
    100% { transform: none; }
  }
  /* the count only ticks when the card is actually shelved — and pops */
  .bay-ref.bump { animation: refBump .32s ease; }
  @keyframes refBump {
    35% { transform: scale(1.22); }
    100% { transform: none; }
  }

  /* ================= mobile dock-lite (from dock-add-lab) =================
     The bay's mobile sibling: a right-edge display-case sliver that opens
     during the add flight and carries the seated card out. The full dock
     (screen-takeover display case) is a later build — this is the add
     choreography + the receipt-icon confirmation. */
  .kdock {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 6000;
    width: min(150px, 39vw);
    background: #fff; border-left: 2px solid #000;
    transform: translateX(102%);
    pointer-events: none; display: none;
  }
  .kdock .krail { position: absolute; inset: 10px 8px; border-left: 1.5px solid #000; }
  .kdock .kslot { position: absolute; left: 18px; right: 14px; top: 35%; height: 2px; background: #000; }
  .kdock-fly {
    position: fixed; left: 0; top: 0; z-index: 6001;
    background: #fff; pointer-events: none; will-change: transform, filter;
  }
  .kdock-fly .kin { position: absolute; inset: 4.3%; border: 1.5px solid #000; display: flex; align-items: center; justify-content: center; }
  .kdock-fly img { height: 76%; width: auto; }
  .kdock-fly .knm {
    position: absolute; left: 0; right: 0; bottom: 5%; text-align: center;
    color: #000; font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
  }
  /* topbar receipt icon: replaces the lisst text tab on mobile */
  .picon { display: none; position: relative; align-items: center; gap: 7px; padding: 8px 8px; flex: 0 0 auto; cursor: pointer; }
  .picon svg { display: block; }
  .picon .pcnt {
    font-family: var(--mono); background: #ddd1b6; color: #000;
    font-size: 10px; font-weight: 700; padding: 2px 6px; min-width: 10px; text-align: center;
  }
  body.light .picon svg { stroke: #000; }
  body.light .picon .pcnt { background: #000; color: #fff; }
  .picon.shake { animation: kpshake .45s ease; }
  @keyframes kpshake {
    20% { transform: translateX(-2.5px) rotate(-4deg); }
    45% { transform: translateX(2.5px) rotate(3deg); }
    70% { transform: translateX(-1.5px) rotate(-2deg); }
    100% { transform: none; }
  }
  .picon .pcnt.bump { animation: kcbump .32s ease; }
  @keyframes kcbump { 35% { transform: scale(1.35); } 100% { transform: none; } }
  @media (hover: none), (max-width: 940px) {
    .kdock { display: block; }
    .picon { display: flex; }
    #nav-lisst { display: none; }
  }

  /* ================= ground switcher (tool chrome) ================= */
  .switch {
    position: fixed; right: 18px; bottom: 18px; z-index: 6000;
    display: flex; flex-direction: column; gap: 7px; align-items: flex-end;
    background: rgba(20, 20, 20, .9); border: 1px solid #333; border-radius: 10px;
    padding: 12px 12px 12px 14px;
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, .4);
  }
  .switch .swhead { color: var(--hint); font-size: 8.5px; margin-bottom: 3px; }
  .switch .swrow { display: flex; gap: 7px; }
  .switch .swbtn {
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    letter-spacing: .16em; text-transform: uppercase;
    color: #fff; border: 1.5px solid #555; border-radius: 6px;
    padding: 6px 10px;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .switch .swbtn:hover { border-color: #fff; }
  .switch .swbtn.on { background: #fff; color: #000; border-color: #fff; }
  body.light .switch { background: rgba(255, 255, 255, .9); border-color: #ddd; box-shadow: 0 8px 30px rgba(0, 0, 0, .12); }
  body.light .switch .swbtn { color: #000; border-color: #bbb; }
  body.light .switch .swbtn:hover { border-color: #000; }
  body.light .switch .swbtn.on { background: #000; color: #fff; border-color: #000; }
  /* on phones the tool chrome collapses to a chip — a third of the screen
     is too much to spend on dev switches; tap SW to unfold */
  .switch .swtoggle { display: none; }
  @media (max-width: 940px) {
    .switch { padding: 0; background: none; border: none; box-shadow: none; -webkit-backdrop-filter: none; backdrop-filter: none; }
    .switch .swtoggle {
      display: block;
      font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .16em;
      color: #fff; background: rgba(20, 20, 20, .9); border: 1.5px solid #555; border-radius: 6px;
      padding: 8px 10px;
    }
    body.light .switch .swtoggle { color: #000; background: rgba(255, 255, 255, .9); border-color: #bbb; }
    .switch:not(.open) .swhead, .switch:not(.open) .swrow { display: none; }
    .switch.open {
      padding: 12px 12px 12px 14px;
      background: rgba(20, 20, 20, .9); border: 1px solid #333; border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .4);
    }
    body.light .switch.open { background: rgba(255, 255, 255, .9); border-color: #ddd; }
    .switch.open .swtoggle { margin-bottom: 4px; }
  }

  /* ================= light ground: the inversion =================
     j-cards-white idiom. --bg/--bone/--soft/--hint flip via inheritance
     (the belt edge fades, body text, restock border, colnav disc all ride
     the vars); --ink stays the constant dark ring/shadow color on both
     grounds, so anything that used --ink as text-on-bone gets an explicit
     color override here instead. */
  body.light {
    --bg: #fff;
    --bone: #111;
    --soft: #444;
    --hint: #767676;
  }
  body.light ::selection { background: #000; color: #fff; }

  /* top bar */
  body.light .topbar { background-color: rgba(255, 255, 255, .88); border-bottom-color: #e2e2e2; }
  body.light .topbar .tab { color: #000; border-color: #000; }
  body.light .topbar .tab:hover { background: #000; color: #fff; }

  /* spine */
  body.light .masthead img { filter: invert(1); }
  body.light .tick { color: #000; }
  body.light .video-wrap video, body.light .vtile video { background: #eee9df; }
  body.light .dm-mini { color: #000; border-color: #000; }
  body.light .dm-mini:hover { background: #000; color: #fff; }
  body.light .dm-mini.glitch-run, body.light .lb-dm-btn.glitch-run { background: #000; color: #fff; }

  /* shelves */
  body.light .band h2 .hl { color: #000; }
  body.light .bandsub { color: #000; }
  body.light .cap .rf { color: #000; }
  body.light .frame { background: #eee9df; }
  body.light .belt {
    background:
      linear-gradient(180deg,
        rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0) 13%,
        rgba(255, 255, 255, 0) 87%, rgba(255, 255, 255, 1) 100%),
      linear-gradient(90deg,
        rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, .13) 18%,
        rgba(0, 0, 0, .13) 82%, rgba(0, 0, 0, 0) 100%);
  }
  body.light .belt::before { background: linear-gradient(to right, #fff, rgba(255, 255, 255, 0)); }
  body.light .belt::after { background: linear-gradient(to left, #fff, rgba(255, 255, 255, 0)); }

  /* collection pages */
  body.light .colpage-inner h2 { color: #000; }
