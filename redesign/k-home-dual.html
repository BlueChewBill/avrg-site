  <script>
  /* K — dual ground. Same engine as h-blackout (conveyor + lightbox +
     collection pages); adds only the ground switch. Data comes from
     ../site/data.js. */
  (function () {
    "use strict";

    const IMG = p => (p ? "../site/" + p : p);
    const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));
    const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

    /* ---- ground switch: black (h-blackout baseline) <-> white (j-cards
       idiom). Persisted so reloads keep the ground under comparison. The
       bar logo swaps assets (white line art on black, circle sticker on
       white); the masthead line logo flips via CSS invert instead. */
    const GROUND_KEY = "avrg-k-ground";
    const barLogo = document.getElementById("bar-logo");
    function setGround(g) {
      document.body.classList.toggle("light", g === "white");
      barLogo.src = IMG(g === "white" ? "img/logo-circle.png" : "img/logo-line-white.png");
      document.querySelectorAll(".swbtn[data-ground]").forEach(b =>
        b.classList.toggle("on", b.dataset.ground === g));
      try { localStorage.setItem(GROUND_KEY, g); } catch (e) {}
    }
    document.querySelectorAll(".swbtn[data-ground]").forEach(b =>
      b.addEventListener("click", () => setGround(b.dataset.ground)));
    let ground = "black";
    try { ground = localStorage.getItem(GROUND_KEY) || "black"; } catch (e) {}
    setGround(ground === "white" ? "white" : "black");

    /* ---- card style: photo (h baseline) | frame v3 | paper | zoned.
       Read before the belts/grids first render; the switch wiring lives
       after the conveyor init because switching rebuilds the rails. */
    const CARD_KEY = "avrg-k-card";
    let CARD = "framev3";
    try { CARD = localStorage.getItem(CARD_KEY) || "framev3"; } catch (e) {}
    if (!/^(photo|framev3|paper|zoned)$/.test(CARD)) CARD = "framev3";
    document.body.dataset.card = CARD;


    /* taglines: rotating, minus the "middle" one; the box height is fixed in CSS */
    const tags = (SITE.taglines || []).filter(t => !/^by no means the m/i.test(t));
    const tick = document.getElementById("tick");
    let ti = 0;

    /* decode swap: incoming phrase resolves out of junk glyphs, left to right.
       no color change — white the whole time. spaces stay spaces so the
       two-line wrap doesn't jump mid-scramble. */
    const GLYPHS = "#%&?{}<>*+=/";
    let decodeTimer = null;
    function decodeTo(text) {
      clearInterval(decodeTimer);
      const chars = [...text];
      const resolveAt = chars.map((c, i) => i * 0.55 + 3 + Math.random() * 5);
      let f = 0;
      decodeTimer = setInterval(() => {
        f++;
        let out = "", done = true;
        for (let i = 0; i < chars.length; i++) {
          if (chars[i] === " ") { out += " "; continue; }
          if (f >= resolveAt[i]) { out += chars[i]; }
          else { out += GLYPHS[(Math.random() * GLYPHS.length) | 0]; done = false; }
        }
        tick.textContent = out;
        if (done) clearInterval(decodeTimer);
      }, 35);
    }

    if (reduced) { tick.textContent = tags[0] || ""; }
    else if (tags.length) { decodeTo(tags[0]); }
    if (!reduced && tags.length > 1) setInterval(() => {
      ti = (ti + 1) % tags.length;
      decodeTo(tags[ti]);
    }, 4400);

    /* quiet decode on button hovers: a shorter, calmer cousin of the tagline
       scramble. Delegated so re-rendered pages (colnav, lisst, shop-all) stay
       wired. DM buttons are excluded — they wear the glitch (CSS) instead;
       lb-list-btn is excluded because its label changes state on click. */
    const canHover = matchMedia("(hover: hover)").matches;
    const HOVER_DECODE = ".tab, .colnav-btn, .inq-send";
    if (!reduced && canHover) document.addEventListener("pointerover", e => {
      const btn = e.target.closest && e.target.closest(HOVER_DECODE);
      if (!btn || btn.dataset.decoding) return;
      const chars = [...btn.textContent];
      if (!chars.length || chars.length > 40) return;
      btn.dataset.decoding = "1";
      const resolveAt = chars.map((c, i) => i * 0.4 + 1 + Math.random() * 2.2);
      let f = 0;
      const t = setInterval(() => {
        f++;
        let out = "", done = true;
        for (let i = 0; i < chars.length; i++) {
          if (!/\S/.test(chars[i])) { out += chars[i]; continue; }
          if (f >= resolveAt[i]) { out += chars[i]; }
          else { out += GLYPHS[(Math.random() * GLYPHS.length) | 0]; done = false; }
        }
        btn.textContent = out;
        if (done) { clearInterval(t); delete btn.dataset.decoding; }
      }, 30);
    });

    /* DM glitch: one run per real entry, driven by a class so mid-run
       hit-test dropouts (see the CSS comment) can't cancel or re-queue it */
    const GLITCH_SEL = ".dm-mini, .lb-dm-btn";
    if (!reduced && canHover) {
      document.addEventListener("pointerover", e => {
        const btn = e.target.closest && e.target.closest(GLITCH_SEL);
        if (!btn || btn.classList.contains("glitch-run")) return;
        if (btn.contains(e.relatedTarget)) return;   /* internal move, not an entry */
        btn.classList.add("glitch-run");
      });
      document.addEventListener("animationend", e => {
        if (e.animationName === "dm-glitch") e.target.classList.remove("glitch-run");
      });
    }

    /* frame v3 card: on card entry the ref chip decodes to AVRG, the name
       decodes to dims (PH_DIMS boards only) and the status word decodes in
       beside its dot; all restore on exit. The .left class arms the chip
       exit animation (see the CSS comment). */
    function decodeInto(el, text) {
      clearInterval(el._t);
      const chars = [...text];
      const resolveAt = chars.map((c, i) => i * 0.4 + 1 + Math.random() * 2.2);
      let f = 0;
      el._t = setInterval(() => {
        f++;
        let out = "", done = true;
        for (let i = 0; i < chars.length; i++) {
          if (!/\S/.test(chars[i])) { out += chars[i]; continue; }
          if (f >= resolveAt[i]) { out += chars[i]; }
          else { out += GLYPHS[(Math.random() * GLYPHS.length) | 0]; done = false; }
        }
        el.textContent = out;
        if (done) clearInterval(el._t);
      }, 30);
    }
    /* the +List chip joins the card-hover decode family: it scrambles to
       a random want-word — inflected, no immediate repeats — and back to
       "+ List" on leave. The ✓ state keeps its meaning and never plays. */
    const WANTS = ["Want?", "Like?", "Need?", "Mine !"];
    function wantWord(card) {
      const lft = card.querySelector(".fc-list .ft");
      if (!lft || /✓/.test(lft.textContent)) return null;
      const pool = WANTS.filter(w => w !== lft.dataset.lastWant);
      const pick = pool[(Math.random() * pool.length) | 0];
      lft.dataset.lastWant = pick;
      return { lft, pick };
    }
    if (canHover) {
      document.addEventListener("pointerover", e => {
        const card = e.target.closest && e.target.closest(".d7f");
        if (!card || (e.relatedTarget && card.contains(e.relatedTarget))) return;
        card.classList.remove("left");
        const ref = card.querySelector(".fc-ref .ft");
        const stx = card.querySelector(".sttxt");
        const nmt = card.querySelector(".nmt");
        const dims = nmt && nmt.dataset.dims;
        const want = wantWord(card);
        if (reduced) {
          if (ref) ref.textContent = "AVRG";
          if (stx) stx.textContent = stx.dataset.txt;
          if (dims) nmt.textContent = dims;
          if (want) want.lft.textContent = want.pick;
          return;
        }
        if (ref) decodeInto(ref, "AVRG");
        if (stx) decodeInto(stx, stx.dataset.txt);
        if (dims) decodeInto(nmt, dims);
        if (want) decodeInto(want.lft, want.pick);
      });
      document.addEventListener("pointerout", e => {
        const card = e.target.closest && e.target.closest(".d7f");
        if (!card || (e.relatedTarget && card.contains(e.relatedTarget))) return;
        card.classList.add("left");
        const ref = card.querySelector(".fc-ref .ft");
        const stx = card.querySelector(".sttxt");
        const nmt = card.querySelector(".nmt");
        if (ref) { clearInterval(ref._t); ref.textContent = ref.dataset.ref; }
        if (stx) { clearInterval(stx._t); stx.textContent = ""; }
        if (nmt) { clearInterval(nmt._t); nmt.textContent = nmt.dataset.nm; }
        const lft = card.querySelector(".fc-list .ft");
        if (lft && !/✓/.test(lft.textContent)) {
          if (reduced) lft.textContent = "+ List";
          else decodeInto(lft, "+ List");
        }
      });
    }

    const handle = (typeof CONTACT === "object" && CONTACT && CONTACT.reddit) || "u/avrg";
    const rname = handle.replace(/^\/?u\//i, "");
    /* primed PM compose: recipient + subject + body prefilled (classic messages,
       not chat — chat has no prefill URL). Lands in reddit.com/message/inbox. */
    const composeUrl = (subject, body) =>
      "https://www.reddit.com/message/compose/?to=" + encodeURIComponent(rname) +
      "&subject=" + encodeURIComponent(subject) +
      "&message=" + encodeURIComponent(body);
    const siteUrl = () => location.href.split("#")[0];
    const genericDm = () => composeUrl("AVRG inquiry", "hey! coming from the AVRG site — ");
    [["spine-dm", "DM " + handle + " →"], ["lb-dm", "DM " + handle + " →"], ["nav-dm", "Contact me"]].forEach(([id, txt]) => {
      const el = document.getElementById(id); el.href = genericDm(); el.textContent = txt;
    });

    /* home band naming: short titles + one-line "how" subs */
    const ACC = { originals: "#d8511f", "hand-shaped": "#1f6fb8", classic: "#c98a12", resale: "#6d4fa3" };
    const SHORT = { originals: "Original", "hand-shaped": "Shaped", classic: "Routed", resale: "Resale" };
    const SUB = {
      originals: "no mold, lots of clamping and a little luck",
      "hand-shaped": "hand shaped, nfb mold pressed",
      classic: "router shaped, nfb mold pressed",
      resale: "pre-owned, still proper"
    };
    const accOf = c => ACC[c.id] || c.accent;
    /* Canva bg-remove pass (2026-07-21): site board -> canva cutout file. The cl/hs sheet
       numbering is the CANONICAL inventory ID (covers all boards, not just the site subset),
       so card refs are derived from it below — data.js's site-ordinal refs are the fallback.
       Face = the one that pixel-matched the current thumb, so the swap changes edge quality,
       not the look. Mapping derivation + confidence per row: card-lab/canva-review.html.
       Originals have no canva batch — they fall through to Vision cuts + data.js refs. */
    const CANVA = {
      "classic-01":"cl3-top","classic-02":"cl4-top","classic-03":"cl5-top","classic-04":"cl6-top",
      "classic-05":"cl7-top","classic-06":"cl8-top","classic-07":"cl11-top","classic-08":"cl12-top",
      "classic-09":"cl14-top","classic-10":"cl15-top","classic-11":"cl16-top","classic-12":"cl18-top",
      "classic-13":"cl19-top","classic-14":"cl21-top","classic-15":"cl22-top","classic-16":"cl23-top",
      "classic-17":"cl24-top","classic-18":"cl26-top","classic-19":"cl27-top",
      "hand-shaped-01":"hs1-top","hand-shaped-02":"hs2-bottom","hand-shaped-03":"hs3-bottom",
      "hand-shaped-04":"hs4-bottom","hand-shaped-05":"hs10-top","hand-shaped-06":"hs14-top",
      "hand-shaped-07":"hs9-top","hand-shaped-08":"hs15-top","hand-shaped-09":"hs16-top",
      "hand-shaped-10":"hs6-top","hand-shaped-11":"hs17-top","hand-shaped-12":"hs7-top",
      "hand-shaped-13":"hs18-top","hand-shaped-14":"hs8-top",
    };
    const STEM = b => b.thumb.split("/").pop().replace(/\.jpg$/, "").replace(/-\d+$/, "");
    /* inventory ref from the canva file name: "cl3-top" -> "CL 3" */
    const INVREF = b => {
      const m = (CANVA[STEM(b)] || "").match(/^([a-z]+)([\d.]+)-/);
      return m ? m[1].toUpperCase() + " " + m[2] : null;
    };
    const refOf = (b, k) => INVREF(b) || b.ref || "#" + String(k + 1).padStart(2, "0");
    /* display title: no "Completes" suffix, dashes flattened */
    const dispTitle = c => c.title.replace(/\s*-\s*Completes/i, "").replace(/ - /g, " ");
    const titleHtml = c => {
      const words = dispTitle(c).split(" ");
      const last = words.pop();
      return esc(words.join(" ")) + (words.length ? " " : "") + '<span class="hl">' + esc(last) + '</span>';
    };
    /* dual: collections whose grid cards show both sides of the board at once */
    const DUAL = { "hand-shaped": true, classic: true };

    /* ---- j-card treatments: meta + renderers (from j-cards-white/black).
       Demo states and placeholder dims ride along, same as the j pages. */
    const CUT = b => {
      const cv = CANVA[STEM(b)];
      return cv ? "card-lab/canva/" + cv + ".png"
                : "card-lab/cuts/" + b.thumb.split("/").pop().replace(/\.jpg$/, "") + "-cut.png";
    };
    const CARDNM = { originals: "Original", "hand-shaped": "Shaped", classic: "Classic", resale: "Resale" };
    const JDIMS = {
      originals: "ORIGINAL · ONE OF ONE",
      "hand-shaped": "HAND-SHAPED · ONE OF ONE",
      classic: "33.5 × 96 MM · MED KICK",
      resale: "PRE-OWNED · STILL PROPER"
    };
    const JSPARK = { "CL 7": 1, "OG 1": 1 };
    const JPEND = { "HS 2": 1 };
    const JGONE = { "CL 5": 1 };
    const PH_DIMS = { "OG 1": "33.5 × 97.5 MM", "HS 1": "33.5 × 97.5 MM" };
    const jref = (c, b, k) => {
      const iv = INVREF(b);
      if (iv) return iv;
      const m = String(b.ref || "").match(/\d+/);
      return (PREFIX[c.id] || "#") + " " + (m ? +m[0] : k + 1);
    };
    function jmeta(c, b, k) {
      const ref = jref(c, b, k);
      return {
        ref,
        id: b.id,
        nm: b.name || CARDNM[c.id] || "",
        img: CUT(b),
        dims: JDIMS[c.id] || "",
        spark: !!JSPARK[ref],
        dimsPh: PH_DIMS[ref] || "",
        st: JGONE[ref] ? "gone" : (JPEND[ref] ? "pend" : "avail"),
        stTxt: JGONE[ref] ? "Sold" : (JPEND[ref] ? "Pending" : "Available")
      };
    }
    const stHtml = m => '<span class="st ' + m.st + '"><span class="dot"></span>' + m.stTxt + '</span>';
    const sparkHtml = m => m.spark ? ' <span class="spark" title="Builder\'s mark — this one came out perfect">✱</span>' : "";
    const soldCls = m => m.st === "gone" ? " sold" : "";
    const cornerHtml = m => '<div class="corner"><span class="wchip rfc">' + esc(m.ref) + '</span>' + sparkHtml(m) + '</div>';
    const JCARDS = {
      framev3: m =>
        '<div class="d7f' + soldCls(m) + '"><div class="panel">' +
          '<div class="inframe"><i class="ctl"></i><i class="cbr"></i><i class="dgl"></i><i class="dgr"></i></div>' +
          (m.spark ? '<span class="spark tspark" title="Builder\'s mark — this one came out perfect">✱</span>' : '') +
          '<div class="stage">' +
            '<div class="corner"><span class="fchip fc-ref"><span class="ft" data-ref="' + esc(m.ref) + '">' + esc(m.ref) + '</span></span></div>' +
            '<img loading="lazy" src="' + m.img + '" alt="' + esc(m.nm) + '"></div>' +
          '<div class="info">' +
            '<span class="nm"><span class="nmt" data-nm="' + esc(m.nm) + '" data-dims="' + esc(m.dimsPh) + '">' + esc(m.nm) + '</span></span>' +
          '</div>' +
          (m.st === "gone" ? "" :
            '<button class="fchip fc-list d7f-cta" data-id="' + esc(m.id) + '"><span class="ft">' +
              (inLisst(m.id) ? "✓ Lisst" : "+ List") + '</span></button>') +
          '<span class="fst ' + m.st + '"><span class="dot"></span><span class="sttxt" data-txt="' + m.stTxt.toUpperCase() + '"></span></span>' +
        '</div></div>',
      paper: m =>
        '<div class="paper' + soldCls(m) + '"><div class="panel">' +
          '<div class="stage">' +
            '<div class="corner"><span class="bchip">' + esc(m.ref) + '</span>' + sparkHtml(m) + '</div>' +
            '<img loading="lazy" src="' + m.img + '" alt="' + esc(m.nm) + '"></div>' +
          '<div class="info">' +
            '<span class="nm">' + esc(m.nm) + '</span>' +
            '<div class="dims">' + m.dims + '</div>' +
            '<div class="r2">' + stHtml(m) + (m.st === "gone" ? "" : '<button class="bchip">+ List</button>') + '</div>' +
          '</div>' +
        '</div></div>',
      zoned: m =>
        '<div class="d5 spread d6z' + soldCls(m) + '"><div class="panel">' +
          '<div class="plate">' +
            '<div class="stage">' + cornerHtml(m) +
              '<img loading="lazy" src="' + m.img + '" alt="' + esc(m.nm) + '"></div>' +
            '<span class="nm">' + esc(m.nm) + '</span>' +
          '</div>' +
          '<div class="info">' +
            '<div class="dims">' + m.dims + '</div>' +
            '<div class="r2">' + stHtml(m) + (m.st === "gone" ? "" : '<button class="wchip">+ List</button>') + '</div>' +
          '</div>' +
        '</div></div>'
    };

    const cardInner = (b, k, dual, c) => {
      if (CARD !== "photo" && c && JCARDS[CARD]) return JCARDS[CARD](jmeta(c, b, k));
      const ref = refOf(b, k);
      const alt = esc(b.name || ref);
      const th = j => IMG((b.thumbs && b.thumbs[j]) || b.thumb);
      const imgs = (dual && b.thumbs && b.thumbs.length > 1)
        ? '<img loading="lazy" src="' + th(0) + '" alt="' + alt + ' — side one">' +
          '<img loading="lazy" src="' + th(1) + '" alt="' + alt + ' — side two">'
        : '<img loading="lazy" src="' + IMG(b.thumb) + '" alt="' + alt + '">';
      return '<div class="frame' + ((dual && b.thumbs && b.thumbs.length > 1) ? " dual" : "") + '">' + imgs + '</div>' +
        '<div class="cap"><span class="nm">' + esc(b.name || ref) + '</span>' +
        (b.name ? '<span class="rf">' + esc(ref) + '</span>' : '') + '</div>';
    };
    const cleanDesc = s => (s || "").replace(/ Hover.*$/, "");

    /* ---- home: shelf bands (desktop) ---- */
    const HOME = COLLECTIONS.map((c, i) => ({ c, i })).filter(x => x.c.boards.length);

    /* top bar tabs, one per section */
    document.getElementById("topnav").innerHTML =
      '<a class="tab" href="#shop-all">Shop All</a>' +
      HOME.map(({ c }) =>
        '<a class="tab" href="#' + c.id + '">' + esc(SHORT[c.id] || c.title) + '</a>'
      ).join("") +
      '<a class="tab" href="#my-lisst" id="nav-lisst"></a>';
    document.getElementById("cols").innerHTML = HOME.map(({ c, i }) =>
      '<section class="band" data-col="' + i + '" style="--acc:' + accOf(c) + '">' +
        '<div class="bandhead">' +
          '<h2 role="link" tabindex="0" title="Open collection"><span class="hl">' + esc(SHORT[c.id] || c.title) + '</span></h2>' +
          '<span class="bandsub label">' + esc(SUB[c.id] || c.tagline || "") + '</span>' +
        '</div>' +
        '<div class="belt" data-col="' + i + '"></div>' +
      '</section>'
    ).join("");

    /* ---- home: tile grid (mobile) ---- */
    /* collection cards in the frame idiom: white card, inner frame, count
       chip at the corner, collection name bold over the board cutout, and
       a "N BOARDS" line so the card clearly reads as a door to a section */
    const tilegrid = document.getElementById("tilegrid");
    tilegrid.insertAdjacentHTML("beforeend", HOME.map(({ c, i }) =>
      '<div class="tile" data-col="' + i + '" role="link" tabindex="0" style="--tacc:' + accOf(c) + '">' +
        '<div class="tcard">' +
          '<span class="tcount">' + c.boards.length + '</span>' +
          '<img loading="lazy" src="' + CUT(c.boards[0]) + '" alt="">' +
          '<span class="tnm">' + esc(SHORT[c.id] || c.title) + '</span>' +
          '<span class="tsub label"><i class="tdot"></i>' + c.boards.length + ' boards</span>' +
        '</div>' +
      '</div>'
    ).join(""));
    tilegrid.querySelectorAll(".tile[data-col]").forEach(t => {
      const go = () => { location.hash = COLLECTIONS[+t.dataset.col].id; };
      t.addEventListener("click", go);
      t.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); }
      });
    });

    /* the one <video> lives in the spine on desktop, tile #1 on mobile */
    const vid = document.getElementById("spinevid");
    const vwrap = document.getElementById("video-wrap");
    const vtile = document.getElementById("vtile");
    const mq = matchMedia("(max-width: 940px)");
    function placeVideo() {
      if (mq.matches) {
        if (vid.parentElement !== vtile) { const f = document.createElement("div"); f.className = "tframe"; f.appendChild(vid); vtile.innerHTML = ""; vtile.appendChild(f); }
      } else if (vid.parentElement !== vwrap) { vtile.innerHTML = ""; vwrap.insertBefore(vid, vwrap.firstChild); }
      /* only roll when the home frame is actually showing */
      if (document.getElementById("colpage").hidden) {
        const p = vid.play(); if (p && p.catch) p.catch(() => {});
      }
    }
    (mq.addEventListener ? mq.addEventListener("change", placeVideo) : mq.addListener(placeVideo));
    placeVideo();

    /* ---- video lightbox: click the video to pull it forward, card-style.
       The cover slot reuses the live spine <video> (placeVideo pattern), so
       enlarging never restarts it. Other clips ride below as thumbs and
       swap in place, the way board photos do. */
    const VIDEOS = [
      { id: "cover", src: "media/covercard.mp4",      poster: "media/covercard-poster.jpg" },
      { id: "clip1", src: "../videos/web/clip-1.mp4", poster: "../videos/web/clip-1-poster.jpg" },
      { id: "clip2", src: "../videos/web/clip-2.mp4", poster: "../videos/web/clip-2-poster.jpg" },
    ];
    const vlb = document.getElementById("vlb");
    const vlbCard = document.getElementById("vlb-card");
    const vlbFrame = document.getElementById("vlb-frame");
    const vlbThumbs = document.getElementById("vlb-thumbs");
    const clipEls = { cover: vid };   /* the spine video IS the cover entry */
    function clipEl(v) {
      if (!clipEls[v.id]) {
        const el = document.createElement("video");
        el.src = v.src; el.poster = v.poster;
        el.muted = true; el.loop = true; el.playsInline = true; el.preload = "metadata";
        clipEls[v.id] = el;
      }
      return clipEls[v.id];
    }
    vlbThumbs.innerHTML = VIDEOS.map((v, i) =>
      '<img src="' + v.poster + '" data-v="' + v.id + '" alt="clip ' + (i + 1) + '">').join("");
    function vlbShow(id) {
      const el = clipEl(VIDEOS.find(x => x.id === id));
      Object.values(clipEls).forEach(x => {
        if (x !== el) { x.pause(); x.style.display = "none"; }
      });
      if (el.parentElement !== vlbFrame) vlbFrame.appendChild(el);
      el.style.display = "";
      el.controls = true;
      const p = el.play(); if (p && p.catch) p.catch(() => {});
      vlbThumbs.querySelectorAll("img").forEach(t => t.classList.toggle("on", t.dataset.v === id));
    }
    vlbThumbs.addEventListener("click", e => {
      const id = e.target.dataset && e.target.dataset.v;
      if (id) vlbShow(id);
    });
    function openVlb() {
      const srcRect = reduced ? null : vid.getBoundingClientRect();
      vlb.hidden = false;
      document.body.classList.add("lb-fade");
      document.body.style.overflow = "hidden";
      vlbShow("cover");
      if (srcRect) {
        const fr = vlbFrame.getBoundingClientRect();
        const s = srcRect.width / fr.width;
        const dx = (srcRect.left + srcRect.width / 2) - (fr.left + fr.width / 2);
        const dy = (srcRect.top + srcRect.height / 2) - (fr.top + fr.height / 2);
        vlbCard.style.transition = "none";
        vlbCard.style.transformOrigin = "50% " + (vlbFrame.offsetTop + vlbFrame.offsetHeight / 2) + "px";
        vlbCard.style.transform = "translate(" + dx + "px," + dy + "px) scale(" + s + ")";
        void vlbCard.offsetWidth;
        vlbCard.style.transition = "";
        vlbCard.style.transform = "none";
      }
      requestAnimationFrame(() => vlb.classList.add("in"));
    }
    function closeVlb(instant) {
      vlb.classList.remove("in");
      document.body.classList.remove("lb-fade");
      setTimeout(() => {
        vlb.hidden = true;
        document.body.style.overflow = "";
        Object.values(clipEls).forEach(x => { if (x !== vid) x.pause(); });
        vid.controls = false; vid.muted = true; vid.style.display = "";
        placeVideo();   /* the cover video rides home, still playing */
      }, (reduced || instant) ? 0 : 330);
    }
    vid.addEventListener("click", () => { if (vlb.hidden) openVlb(); });
    document.getElementById("vlb-close").addEventListener("click", () => closeVlb());
    document.getElementById("vlb-scrim").addEventListener("click", () => closeVlb());
    document.addEventListener("keydown", e => {
      if (!vlb.hidden && e.key === "Escape") closeVlb();
    });

    /* ---- routing: home <-> collection page ---- */
    const home = document.getElementById("home");
    const colpage = document.getElementById("colpage");

    const LOOP_SVG =
      '<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
        '<path d="M3 12a9 9 0 1 0 3.4-7.06"/><polyline points="3 2.5 3 8 8.5 8"/>' +
      '</svg>';

    /* bottom nav shared by collection pages and shop-all.
       skip: index of the page you're on (-1 to skip none, "shop-all" handled via onShopAll) */
    function colnavHtml(skip, onShopAll) {
      const links =
        (onShopAll ? "" : '<a class="colnav-btn label" href="#shop-all">Shop All</a>') +
        COLLECTIONS
          .map((o, j) => ({ o, j }))
          .filter(x => x.j !== skip)
          .map(({ o }) =>
            '<a class="colnav-btn label" style="--acc:' + accOf(o) + '" href="#' + o.id + '">' +
              esc(dispTitle(o)) +
            '</a>'
          ).join("");
      return '<div class="colnav">' +
          '<a class="colnav-home" href="#" title="Back to the main page" aria-label="Back to the main page">' + LOOP_SVG + '</a>' +
          '<div class="colnav-links">' + links + '</div>' +
        '</div>';
    }

    function colSectionHtml(c, i, afterH2) {
      return '<h2>' + titleHtml(c) + '</h2>' +
        (afterH2 || "") +
        '<p class="desc">' + esc(cleanDesc(c.description)) + '</p>' +
        (c.boards.length
          ? '<div class="shelfgrid">' +
              c.boards.map((b, k) => '<div class="scard" data-k="' + k + '" role="button" tabindex="0">' + cardInner(b, k, DUAL[c.id], c) + '</div>').join("") +
            '</div>'
          : '<div class="restock label">Restocking — check back</div>');
    }

    /* proportion lock: shelf-grid cards render at the desktop reference width
       (232px — the j-card spec) and scale down to their slot, so a narrow-grid
       card is a photographic reduction of the desktop card instead of the
       desktop chrome squeezed onto a smaller footprint. Desktop slots are
       232px, so this is a no-op there — no breakpoint, one continuous law.
       Photo cards keep their fluid layout (designed that way). */
    const CARD_REF_W = 232;
    function lockCardScale() {
      document.querySelectorAll(".shelfgrid .scard").forEach(sc => {
        const inner = sc.querySelector(":scope > .d7f, :scope > .paper, :scope > .d6z, :scope > .d5");
        if (!inner) return;
        const w = sc.clientWidth;
        if (!w) return;               /* grid hidden (route() re-runs us once it shows) */
        if (w >= CARD_REF_W - 1) {
          inner.style.width = inner.style.transform = sc.style.height = "";
          return;
        }
        const s = w / CARD_REF_W;
        inner.style.width = CARD_REF_W + "px";
        inner.style.transformOrigin = "0 0";
        inner.style.transform = "scale(" + s + ")";
        sc.style.height = inner.offsetHeight * s + "px";
      });
    }
    function bindScards() {
      lockCardScale();
      colpage.querySelectorAll("section[data-col]").forEach(sec => {
        const i = +sec.dataset.col;
        sec.querySelectorAll(".scard").forEach(s => {
          s.addEventListener("click", () => openLb(i, +s.dataset.k, s));
          s.addEventListener("keydown", e => {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openLb(i, +s.dataset.k, s); }
          });
        });
      });
    }

    /* no collection gets its own page: the selection leads, then the whole
       set continues below it — one scroll through everything, on every
       screen size */
    function renderColPage(c, i) {
      const links =
        '<div class="colpage-links">' +
          '<a class="back label" href="#">← Back to collections</a>' +
        '</div>';
      const order = [i].concat(COLLECTIONS.map((_, j) => j).filter(j => j !== i));
      colpage.innerHTML =
        order.map((j, n) =>
          '<section class="colpage-inner' + (n ? " shopall-sec" : "") + '" data-col="' + j + '" style="--acc:' + accOf(COLLECTIONS[j]) + '">' +
            colSectionHtml(COLLECTIONS[j], j, n === 0 ? links : "") +
          '</section>'
        ).join("") +
        '<section class="colpage-inner shopall-foot">' + colnavHtml(i, true) + '</section>';
      bindScards();
    }

    /* shop all: every collection page stitched into one scroll */
    function renderShopAll() {
      colpage.innerHTML =
        '<section class="colpage-inner shopall-head">' +
          '<h2>Shop <span class="hl">All</span></h2>' +
          '<div class="colpage-links">' +
            '<a class="back label" href="#">← Back to collections</a>' +
          '</div>' +
        '</section>' +
        COLLECTIONS.map((c, i) =>
          '<section class="colpage-inner shopall-sec" data-col="' + i + '" style="--acc:' + accOf(c) + '">' +
            colSectionHtml(c, i) +
          '</section>'
        ).join("") +
        '<section class="colpage-inner shopall-foot">' + colnavHtml(-1, true) + '</section>';
      bindScards();
    }

    /* ---- my lisst page: picked boards + one inquiry about all of them ---- */
    function renderLisst() {
      const entries = myLisst.map(id => BOARD_INDEX[id]);
      const cards = entries.length
        ? '<div class="shelfgrid">' + entries.map(({ c, ci, b, k }) =>
            '<div class="scard lisst-card" data-ci="' + ci + '" data-k="' + k + '" role="button" tabindex="0">' +
              '<button class="lisst-remove" type="button" data-id="' + b.id + '" title="Remove from lisst" aria-label="Remove from lisst">✕</button>' +
              cardInner(b, k, DUAL[c.id], c) +
            '</div>'
          ).join("") + '</div>'
        : '<div class="lisst-empty label">Nothing on the lisst yet — open a board and hit “+ add to my lisst”</div>';
      const refs = myLisst.map(lisstLabel);
      const dmLisst = refs.length
        ? '<div class="inq-or"><span class="label" style="color:var(--soft)">reddit person?</span><br>' +
          '<a class="dm-mini label" target="_blank" rel="noopener" href="' +
            composeUrl("Interested in " + refs.join(", "),
              "hey! interested in these from the AVRG site: " + refs.join(", ") + " → " + siteUrl()) +
          '">DM the lisst →</a></div>'
        : "";
      colpage.innerHTML =
        '<section class="colpage-inner" style="--acc:#d8511f">' +
          '<h2>My <span class="hl">Lisst</span></h2>' +
          '<div class="colpage-links">' +
            '<a class="back label" href="#">← Back to collections</a>' +
            '<a class="back label" href="#shop-all">Shop all collections →</a>' +
          '</div>' +
          cards +
          '<div class="inq">' +
            '<h3 class="inq-head label" style="font-size:12px">Send one message about ' + (refs.length ? "the lisst" : "anything") + '</h3>' +
            '<p class="inq-sub">' + (refs.length ? "your picks ride along automatically: " + esc(refs.join(", ")) : "no picks attached — just say hi") + '</p>' +
            '<form id="inq-form">' +
              '<label for="inq-name">Name / alias</label>' +
              '<input id="inq-name" name="name" type="text" autocomplete="name" placeholder="optional">' +
              '<label for="inq-method">Preferred contact</label>' +
              '<select id="inq-method" name="preferred_method">' +
                '<option value="email">Email</option>' +
                '<option value="reddit">Reddit</option>' +
                '<option value="instagram">Instagram</option>' +
              '</select>' +
              '<label for="inq-handle">Where do we reach you</label>' +
              '<input id="inq-handle" name="contact" type="text" required placeholder="address or handle">' +
              '<label for="inq-msg">Message</label>' +
              '<textarea id="inq-msg" name="message" placeholder="optional"></textarea>' +
              '<button class="inq-send label" type="submit">Send it →</button>' +
              '<p class="inq-status" id="inq-status"></p>' +
            '</form>' +
            dmLisst +
          '</div>' +
          colnavHtml(-1, true) +
        '</section>';
      lockCardScale();
      colpage.querySelectorAll(".lisst-remove").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          toggleLisst(btn.dataset.id);
          renderBay();
          renderLisst();
        });
      });
      colpage.querySelectorAll(".lisst-card").forEach(s => {
        const go = () => openLb(+s.dataset.ci, +s.dataset.k, s);
        s.addEventListener("click", go);
        s.addEventListener("keydown", e => {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); }
        });
      });
      const form = document.getElementById("inq-form");
      const status = document.getElementById("inq-status");
      form.addEventListener("submit", async e => {
        e.preventDefault();
        if (/^PASTE-/.test(SPLITFORMS_KEY)) {
          status.textContent = "form isn’t wired up yet — use the DM button for now";
          return;
        }
        const data = Object.fromEntries(new FormData(form).entries());
        data.access_key = SPLITFORMS_KEY;
        data.lisst = refs.join(", ") || "none";
        data.subject = "AVRG inquiry — " + (refs.length ? refs.join(", ") : "general");
        data.page = siteUrl();
        status.textContent = "sending…";
        try {
          const r = await fetch("https://splitforms.com/api/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify(data)
          });
          if (r.ok) { status.textContent = "sent — talk soon ✓"; form.reset(); }
          else { status.textContent = "something broke — try the DM button instead"; }
        } catch (err) {
          status.textContent = "something broke — try the DM button instead";
        }
      });
    }

    function route() {
      if (!lb.hidden) closeLb(true);
      if (!vlb.hidden) closeVlb(true);
      const id = (location.hash || "").replace(/^#/, "");
      const i = COLLECTIONS.findIndex(c => c.id === id);
      if (id === "shop-all") {
        renderShopAll();
        home.hidden = true; colpage.hidden = false;
        vid.pause();

    function sourceFrame() {
      if (!cur) return null;
      const view = colpage.hidden
        ? document.querySelector('#cols section[data-col="' + cur.ci + '"] .belt')
        : colpage.querySelector('section[data-col="' + cur.ci + '"]');
      if (!view) return null;
      const sel = colpage.hidden ? ".card" : ".scard";
      const el = Array.from(view.querySelectorAll(sel)).find(n =>
        +n.dataset.k === cur.k && n.style.visibility !== "hidden");
      /* j treatments anchor on their square .stage; the photo card on its .frame */
      return el ? el.querySelector(".stage, .frame") : null;
    }

    function flipFrom(frameEl) {
      lbCard.style.transition = "none";
      if (frameEl) {
        const sr = frameEl.getBoundingClientRect();
        const fr = lbCard.querySelector(".frame").getBoundingClientRect();
        const s = sr.width / fr.width;
        const dx = (sr.left + sr.width / 2) - (fr.left + fr.width / 2);
        const dy = (sr.top + sr.height / 2) - (fr.top + fr.height / 2);
        const frame = lbCard.querySelector(".frame");
        lbCard.style.transformOrigin = "50% " + (frame.offsetTop + frame.offsetHeight / 2) + "px";
        lbCard.style.transform = "translate(" + dx + "px," + dy + "px) scale(" + s + ")";
      } else {
        lbCard.style.transform = "scale(.6)";
      }
      void lbCard.offsetWidth;
      lbCard.style.transition = "";
      lbCard.style.transform = "none";
    }

    /* mobile: the tapped card lifts out of the grid — its slot stays empty
       until the card flies back into it on close (the "hole" is the proof
       the big card IS that card, and the return can't land misaligned) */
    let lbSrc = null;
    function openLb(ci, k, sourceEl) {
      populate(ci, k);
      lb.hidden = false;
      document.body.classList.add("lb-fade");
      document.body.style.overflow = "hidden";
      /* .stage first: the j-cards' square image area is the true counterpart
         of the lb's square .frame — matching frame↔panel centers landed the
         card low (the panel includes the caption zone; its center sits lower) */
      if (!reduced) flipFrom(sourceEl ? sourceEl.querySelector(".stage, .frame") : null);
      if (dockActive() && sourceEl) {
        lbSrc = { el: sourceEl, ci, k };
        sourceEl.style.visibility = "hidden";   /* after flipFrom measured it */
      }
      if (dockActive() && CARD === "framev3") {
        lbCard.classList.add("tset");           /* fills land as the zoom settles */
        const stx = document.getElementById("lb-fv3-sttxt");
        if (stx.dataset.txt) { if (reduced) stx.textContent = stx.dataset.txt; else decodeInto(stx, stx.dataset.txt); }
      }

    }

    function closeLb(instant) {
      /* return target: the lifted card's own (hidden) slot while we're still
         on that board — sourceFrame() skips hidden cards, so ask it only
         after a swipe moved us to a different board */
      const onSrc = lbSrc && cur && lbSrc.ci === cur.ci && lbSrc.k === cur.k;
      const back = (reduced || instant) ? null
        : onSrc ? lbSrc.el.querySelector(".stage, .frame") : sourceFrame();
      lb.classList.remove("in");
      lbCard.classList.remove("tset");
      document.body.classList.remove("lb-fade");   /* grid fades back in under the returning card */
      if (back) {
        const sr = back.getBoundingClientRect();
        const fr = lbCard.querySelector(".frame").getBoundingClientRect();
        const s = sr.width / fr.width;
        const dx = (sr.left + sr.width / 2) - (fr.left + fr.width / 2);
        const dy = (sr.top + sr.height / 2) - (fr.top + fr.height / 2);
        lbCard.style.transform = "translate(" + dx + "px," + dy + "px) scale(" + s + ")";
      }

        lbCard.style.transform = "none";

    function step(dir) {
      if (!cur) return;
      const c = COLLECTIONS[cur.ci];
      /* walk the current board's photos first; only cross to the
         next/previous board once you run off either end */
      let k = cur.k, j = cur.j + dir;
      if (j < 0 || j >= c.boards[k].photos.length) {
        k = (cur.k + dir + c.boards.length) % c.boards.length;
        j = dir > 0 ? 0 : c.boards[k].photos.length - 1;
      }
      /* same board, different angle: swap in place — the slide/fade is
         reserved for moving between boards */
      if (k === cur.k) { populate(cur.ci, k, j); return; }
      if (!reduced) {
        lbCard.style.transition = "transform .18s ease, opacity .18s ease";
        lbCard.style.opacity = "0";
        lbCard.style.transform = "translateX(" + (-dir * 30) + "px)";
        setTimeout(() => {
          populate(cur.ci, k, j);
          lbCard.style.transition = "none";
          lbCard.style.transform = "translateX(" + (dir * 30) + "px)";
          void lbCard.offsetWidth;
          lbCard.style.transition = "transform .22s ease, opacity .22s ease";
          lbCard.style.opacity = "1";
          lbCard.style.transform = "none";
          setTimeout(() => { lbCard.style.transition = ""; }, 240);

    }

    /* ---- conveyor engine ---- */
    const rails = [];
    const BASE_V = -26;

    /* (re)build a belt's cards for the current --cardW. Runs at init and
       again when the width breakpoint flips under a live page — the CSS
       card width changes with the media query but a frozen rail spacing
       doesn't, and frames wider than their slots crowd into each other. */
    function buildBelt(rail) {
      const belt = rail.belt;
      const col = COLLECTIONS[+belt.dataset.col];
      const cardW = parseFloat(getComputedStyle(belt).getPropertyValue("--cardW")) || 172;
      const spacing = cardW + 44;   /* room for the 1.14x center zoom */

      const minTotal = Math.max(innerWidth + spacing * 4, 3200);
      const reps = Math.max(2, Math.ceil(minTotal / (col.boards.length * spacing)));
      const items = [];
      for (let r = 0; r < reps; r++) col.boards.forEach((b, k) => items.push({ b, k }));

      belt.innerHTML = items.map(({ b, k }) =>
        '<div class="card" data-k="' + k + '" role="button" tabindex="-1">' + cardInner(b, k, 0, col) + '</div>'
      ).join("");

      rail.spacing = spacing;
      rail.cards = Array.from(belt.children);
      rail.total = items.length * spacing;
      rail.offset = rail.offset % rail.total;   /* keep the drift position */
    }

    document.querySelectorAll(".belt").forEach(belt => {
      const ci = +belt.dataset.col;
      const rail = {
        belt, spacing: 0, cards: [], total: 1,
        offset: 0, v: BASE_V, pointerX: null,
        dragging: false, dragX: 0, moved: 0,
        active: true,
      };
      buildBelt(rail);

      belt.addEventListener("pointermove", e => {
        const r = belt.getBoundingClientRect();
        rail.pointerX = e.clientX - r.left;
        if (rail.dragging) {
          const dx = e.clientX - rail.dragX;
          rail.dragX = e.clientX;
          rail.offset += dx;
          rail.moved += Math.abs(dx);
        }
      });
      belt.addEventListener("pointerleave", () => { rail.pointerX = null; rail.dragging = false; });
      belt.addEventListener("pointerdown", e => {
        rail.dragging = true; rail.dragX = e.clientX; rail.moved = 0;
        belt.classList.add("dragging");
      });
      addEventListener("pointerup", () => { rail.dragging = false; belt.classList.remove("dragging"); });
      belt.addEventListener("click", e => {
        if (rail.moved > 6) return;
        const card = e.target.closest(".card");
        if (card) openLb(ci, +card.dataset.k, card);
      });

      rails.push(rail);
    });

    const io = new IntersectionObserver(entries => {
      entries.forEach(en => {
        const rail = rails.find(r => r.belt === en.target);
        if (rail) rail.active = en.isIntersecting;
      });
    }, { rootMargin: "120px" });
    rails.forEach(r => io.observe(r.belt));

    /* rebuild belts when the breakpoint flips their card width (or the
       window outgrows the loop) — debounced so drag-resizing stays cheap */
    let beltResizeT = null;
    /* topbar height feeds the mobile lightbox sheet's top offset (the header
       stays visible + live above the inspection view) */
    const setTbh = () =>
      document.body.style.setProperty("--tbh", document.querySelector(".topbar").offsetHeight + "px");
    setTbh();
    addEventListener("resize", () => {
      clearTimeout(beltResizeT);
      beltResizeT = setTimeout(() => {
        setTbh();
        lockCardScale();
        rails.forEach(rail => {
          const cw = parseFloat(getComputedStyle(rail.belt).getPropertyValue("--cardW")) || 172;
          if (cw + 44 !== rail.spacing || innerWidth + (cw + 44) * 4 > rail.total) buildBelt(rail);
        });
      }, 180);
    });

    const smooth = (a, b, x) => {
      const t = Math.min(1, Math.max(0, (x - a) / (b - a)));
      return t * t * (3 - 2 * t);
    };

    let last = performance.now();
    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;

      if (!lb.hidden || !vlb.hidden) { requestAnimationFrame(frame); return; }

      rails.forEach(rail => {
        if (!rail.active) return;
        const w = rail.belt.clientWidth;
        if (!w) return;                            /* hidden on mobile */
        const cx = w / 2;

        let target = BASE_V;
        if (rail.pointerX != null && !rail.dragging) {
          const dx = rail.pointerX - cx;
          if (Math.abs(dx) > rail.spacing) {
            const t = Math.min(1, (Math.abs(dx) - rail.spacing) / Math.max(120, cx - rail.spacing));
            target = -Math.sign(dx) * (60 + 340 * t);
          }
        }
        if (!reduced && !rail.dragging) rail.v += (target - rail.v) * Math.min(1, dt * 4);
        if (!rail.dragging && !reduced) rail.offset += rail.v * dt;

        rail.offset = ((rail.offset % rail.total) + rail.total) % rail.total;

        rail.cards.forEach((card, i) => {
          let x = (i * rail.spacing + rail.offset) % rail.total;
          x -= rail.spacing * 1.5;
          if (x < -rail.spacing * 1.6 || x > w + rail.spacing * .6) {
            card.style.visibility = "hidden";
            return;
          }
          card.style.visibility = "visible";
          const center = x + rail.spacing / 2;
          const d = Math.abs(center - cx) / rail.spacing;
          const fall = smooth(0.62, 2.6, d);
          const s = 1.14 - 0.36 * fall;
          /* soften near the belt edges so cards dissolve into the black —
             gentle enough that they're still semi-visible as they leave */
          const edge = Math.min(center, w - center) / rail.spacing;
          const o = (1 - 0.62 * fall) * smooth(-0.4, 0.8, edge);
          card.style.transform = "translate3d(" + x + "px,-50%,0) scale(" + s.toFixed(3) + ")";
          /* shadow drifts with position: enters offset toward the incoming edge,
             sits directly under the card at shelf center, exits leading the other way */
          const shx = Math.max(-14, Math.min(14, ((center - cx) / rail.spacing) * 9));
          card.style.setProperty("--shx", shx.toFixed(1) + "px");
          card.style.opacity = o.toFixed(3);
          card.style.zIndex = String(1000 - Math.round(d * 100));
        });
      });

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    /* card switch: rebuild the belts in the new treatment and re-render
       whatever page the hash currently shows */
    function setCard(s) {
      CARD = s;
      document.body.dataset.card = s;
      try { localStorage.setItem(CARD_KEY, s); } catch (e) {}
      document.querySelectorAll(".swbtn[data-card]").forEach(b =>
        b.classList.toggle("on", b.dataset.card === s));
      rails.forEach(rail => buildBelt(rail));
      route();
    }
    document.querySelectorAll(".swbtn[data-card]").forEach(b => {
      b.classList.toggle("on", b.dataset.card === CARD);
      b.addEventListener("click", () => { if (b.dataset.card !== CARD) setCard(b.dataset.card); });
    });
    document.querySelector(".swtoggle").addEventListener("click", () =>
      document.querySelector(".switch").classList.toggle("open"));

    /* seat switch (tool chrome, temporary): how a card lands on its
       shelf — comparison row until one variant wins */
    const SEAT_KEY = "avrg-k-seat";
    let SEAT = "drop";
    try { SEAT = localStorage.getItem(SEAT_KEY) || "drop"; } catch (e) {}
    document.querySelectorAll(".swbtn[data-seat]").forEach(b => {
      b.classList.toggle("on", b.dataset.seat === SEAT);
      b.addEventListener("click", () => {
        SEAT = b.dataset.seat;
        try { localStorage.setItem(SEAT_KEY, SEAT); } catch (e) {}
        document.querySelectorAll(".swbtn[data-seat]").forEach(x =>
          x.classList.toggle("on", x.dataset.seat === SEAT));
      });
    });

    /* ---- mobile dock-lite: the dock-add-lab spline flight, scaled to the
       viewport. Numbers are the saved presets from redesign/dock-add-lab.html
       (2026-07-21) — retune in the lab, re-bake here. The Dock switcher row
       flips paths (comparison chrome, same deal as the Seat row). ---- */
    const DOCK_KEY = "avrg-k-dock";
    let DOCK = "ramp";
    try { DOCK = localStorage.getItem(DOCK_KEY) || "ramp"; } catch (e) {}
    document.querySelectorAll(".swbtn[data-dock]").forEach(b => {
      b.classList.toggle("on", b.dataset.dock === DOCK);
      b.addEventListener("click", () => {
        DOCK = b.dataset.dock;
        try { localStorage.setItem(DOCK_KEY, DOCK); } catch (e) {}
        document.querySelectorAll(".swbtn[data-dock]").forEach(x =>
          x.classList.toggle("on", x.dataset.dock === DOCK));
      });
    });
    const DOCK_TUNE = {
      ramp:  { dur: 1.9, dip: 0.70, crest: 1.25, side: 0.20, lead: 0.60 },
      toss:  { dur: 1.9, dip: 0.85, crest: 1.25, side: 0.20, lead: 0.60 },
      swoop: { dur: 1.9, dip: 0.85, crest: 1.25, side: 0.20, lead: 0.60 }
    };
    const kdock = document.getElementById("kdock");
    const dockActive = () => matchMedia("(hover: none), (max-width: 940px)").matches;
    const kss = t => t * t * (3 - 2 * t);
    const kcl = v => Math.min(1, Math.max(0, v));
    /* Catmull-Rom over {x,y,s,r} with p as the knot vector — the lab's driver */
    function kpose(p, K) {
      if (p <= K[0].p) return K[0];
      if (p >= K[K.length - 1].p) return K[K.length - 1];
      let i = 0;
      while (p > K[i + 1].p) i++;
      const k0 = K[Math.max(0, i - 1)], k1 = K[i], k2 = K[i + 1], k3 = K[Math.min(K.length - 1, i + 2)];
      const t = (p - k1.p) / (k2.p - k1.p);
      const h = (a, b, c, d) => {
        const m1 = (c - a) / 2, m2 = (d - b) / 2, t2 = t * t, t3 = t2 * t;
        return (2 * t3 - 3 * t2 + 1) * b + (t3 - 2 * t2 + t) * m1 + (-2 * t3 + 3 * t2) * c + (t3 - t2) * m2;
      };
      return { x: h(k0.x, k1.x, k2.x, k3.x), y: h(k0.y, k1.y, k2.y, k3.y),
               s: h(k0.s, k1.s, k2.s, k3.s), r: h(k0.r, k1.r, k2.r, k3.r) };
    }
    /* landing thunk: low sine drop, synthesized — no asset */
    let kactx = null;
    function kthunk() {
      try {
        kactx = kactx || new (window.AudioContext || window.webkitAudioContext)();
        const t = kactx.currentTime;
        const o = kactx.createOscillator(), g = kactx.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(150, t);
        o.frequency.exponentialRampToValueAtTime(52, t + .09);
        g.gain.setValueAtTime(.18, t);
        g.gain.exponentialRampToValueAtTime(.001, t + .13);
        o.connect(g).connect(kactx.destination);
        o.start(t); o.stop(t + .14);
      } catch (e) { /* no audio — land silently */ }
    }
    function dockPing() {
      const pc = document.getElementById("pcnt"), pi = document.getElementById("picon");
      pc.classList.add("bump"); pi.classList.add("shake");
      setTimeout(() => { pc.classList.remove("bump"); pi.classList.remove("shake"); }, 500);
    }
    let dockFlying = false;
    function dockAdd(id, cardEl) {
      if (dockFlying || reduced) { dockPing(); return; }
      const src = cardEl && cardEl.querySelector(".stage img, .frame img");
      if (!src) { dockPing(); return; }
      const vw = innerWidth, vh = innerHeight;
      const X = u => u / 390 * vw, Y = u => u / 720 * vh;   /* lab phone-space → viewport */
      const T = DOCK_TUNE[DOCK] || DOCK_TUNE.ramp;
      /* the flying card: the lab's white mini-card with this board's cutout */
      const bw = Math.min(230, vw * .59), bh = bw * 300 / 230;
      const fly = document.createElement("div");
      fly.className = "kdock-fly";
      fly.style.width = bw.toFixed(1) + "px"; fly.style.height = bh.toFixed(1) + "px";
      const bmeta = BOARD_INDEX[id];
      fly.innerHTML = '<div class="kin"><img src="' + esc(src.src) + '" alt=""></div>' +
        (bmeta && bmeta.b.name ? '<span class="knm">' + esc(bmeta.b.name) + "</span>" : "");
      document.body.appendChild(fly);
      /* start = the real card's measured rect; seat = the slot's geometry
         (offset*, not rects — the dock is transformed offscreen) */
      const sr = cardEl.getBoundingClientRect();
      const dockW = kdock.offsetWidth, slotY = document.getElementById("kslot").offsetTop;
      const seatS = dockW * .52 / bw;
      const seat = { p: 0.88, x: vw - dockW + 18 + (dockW - 32) / 2, y: slotY - bh * seatS / 2, s: seatS, r: 0 };
      const start = { p: 0, x: sr.left + sr.width / 2, y: sr.top + sr.height / 2, s: sr.width / bw, r: 0 };
      const dip = T.dip, crest = T.crest;
      const K = DOCK === "swoop" ? [
        start,
        { p: 0.18, x: start.x - X(30), y: Y(190), s: 1.10, r: -5 },
        { p: 0.42, x: X(195 - 120 * dip), y: Y(84 * (2 - crest)), s: 1.18, r: -2 },
        { p: 0.66, x: X(192), y: Y(268), s: .80, r: 6 },
        seat
      ] : DOCK === "toss" ? [
        start,
        { p: 0.16, x: start.x - X(60 * dip), y: start.y + Y(80 * dip), s: .90, r: -8 * dip },
        { p: 0.50, x: X(195), y: Y(90 * (2 - crest)), s: 1.10, r: 4 },
        { p: 0.72, x: X(322), y: Y(128), s: .58, r: 7 },
        seat
      ] : [
        start,
        { p: 0.12, x: start.x - X(34), y: start.y + Y(92 * dip), s: .92, r: -8 * dip },
        { p: 0.28, x: X(58), y: start.y + Y(170 * dip), s: .66, r: -3 },
        { p: 0.42, x: X(178), y: start.y + Y(128 * dip), s: 1.00, r: 3 },
        { p: 0.60, x: X(272), y: Y(96 * (2 - crest)), s: 1.10, r: 6 },
        { p: 0.76, x: X(296), y: Y(138), s: .60, r: 2 },
        seat
      ];
      /* size field over the screen: max at center-x, fading out into the seat */
      const sideMul = (x, p) => 1 - T.side * Math.pow(Math.abs(x - vw / 2) / (vw / 2), 2) * (1 - kss(kcl((p - .70) / .18)));
      dockFlying = true;
      let landed = false;
      const t0 = performance.now(), dur = T.dur * 1000;
      (function frame(now) {
        const p = kcl((now - t0) / dur);
        const q = kpose(p, K);
        const s = q.s * sideMul(q.x, p);
        /* landing press: compress about the bottom edge, planted on the slot */
        const press = Math.sin(Math.PI * kcl((p - .88) / .09));
        const carry = (dockW * 1.04) * kss(kcl((p - .93) / .07));
        let tr = "translate(" + (q.x - bw / 2 + carry).toFixed(1) + "px," + (q.y - bh / 2).toFixed(1) + "px) scale(" + s.toFixed(3) + ") rotate(" + q.r.toFixed(2) + "deg)";
        if (press > 0) {
          const k = 1 - .16 * press;
          tr += " translate(0," + (bh / 2 * (1 - k)).toFixed(1) + "px) scale(" + (1 + .06 * press).toFixed(3) + "," + k.toFixed(3) + ")";
        }
        fly.style.transform = tr;
        const alt = kcl((s - seatS) / Math.max(.2, start.s - seatS));
        const o = (2 + 9 * alt) * (1 - .6 * press);
        fly.style.filter = "drop-shadow(" + o.toFixed(1) + "px " + (o * 1.25).toFixed(1) + "px 0 rgba(0,0,0," + (.5 + .2 * alt + .18 * press).toFixed(2) + "))";
        const open = kss(kcl((p - .04) / (.34 / T.lead)));
        const shut = kss(kcl((p - .93) / .07));
        kdock.style.transform = "translateX(" + (102 * (1 - open) + 104 * shut) + "%)";
        if (!landed && p >= .88) { landed = true; kthunk(); dockPing(); }
        if (p < 1) requestAnimationFrame(frame);
        else {
          fly.remove();
          kdock.style.transform = "translateX(102%)";
          dockFlying = false;
        }
      })(t0);
    }

    /* ---- cart bay: right-edge card sliver (sprint item 2) ----
       State classes on #bay: .near while the pointer is in the proximity
       zone (rails close), .armed once the close finishes with the pointer
       still there (card shadow fades in), .open after a click (panel
       slides out, arrow draws, shelf shadows stagger in). The hit zone
       sits OVER the sliver so hovering the sliver itself can't disarm. */
    const bay = document.getElementById("bay");
    const bayPanel = document.getElementById("bay-panel");
    const bayInner = document.getElementById("bay-inner");
    const bayDot = document.getElementById("bay-dot");
    const bayRef = document.getElementById("bay-ref");
    const baySt = document.getElementById("bay-st");
    const bayShelvesEl = document.getElementById("bay-shelves");
    const bayShelves = Array.from(bayShelvesEl.children);

    /* boards still mid-flight render hidden (.preseat) — the flight lands
       on the hidden item's measured rect and reveals it. The count chip
       also waits for the touchdown, so the tally never runs ahead of the
       cards actually shelved. */
    const pendingSeat = new Set();
    function updateBayCount() {
      bayRef.textContent = String(myLisst.length - pendingSeat.size);
      baySt.classList.toggle("none", !myLisst.length);
    }
    function renderBay() {
      updateBayCount();
      bayShelves.forEach(s => { s.innerHTML = ""; });
      myLisst.forEach((id, n) => {
        const { ci, b, k } = BOARD_INDEX[id];
        const img = document.createElement("img");
        img.className = "bay-item";
        if (pendingSeat.has(id)) img.classList.add("preseat");
        img.dataset.id = id;
        img.src = CUT(b);
        img.alt = img.title = lisstLabel(id);
        img.addEventListener("click", () => openLb(ci, k));
        bayShelves[Math.min(3, (n / 4) | 0)].appendChild(img);
      });
    }

    /* proximity: within 130px of the right screen edge, inside the bay's
       vertical range. Tracked on the document so the belt underneath keeps
       its own right-edge hover behavior. The emergence choreography is all
       CSS off the .near class — enter fast-then-slow, exit long and quiet. */
    /* the drawer driver: one master progress value p (0..1), advanced by
       rAF; every piece is posed from it each frame. The cursor is the
       motor — in the trigger zone p always climbs, but the RATE scales
       with proximity: parked at the outer bound it's a slow continuous
       crawl that completes on its own; at the page edge it's quick, so
       the approach feels like doing the pull. Click locks it at full,
       the arrow drains it fast, otherwise leaving drains it slowly.
       Speed knobs here; geometry knobs on .bay in the CSS. */
    const BAY_TUNE = {
      trigger: 195,     /* px from the right edge that wakes the drawer */
      durSlow: 6.5,     /* seconds to full with the cursor parked at the outer bound */
      durFast: 1.1,     /* seconds to full with the cursor at the page edge */
      durShut: 1.4,     /* the quiet drain when nothing was clicked */
      durSnap: .45,     /* click: sped up / locked in */
      durClose: .4,     /* the arrow's quick shut */
      /* the outside frame is one continuous motion: top/bottom lines ride
         to the outside edge (accelerating — the catching-up is theirs to
         do, the inner line never slows), round the corner into the face
         halves, and the face only lands (connects) at max visibility.
         Horizontal motion is ONE eased distance over `travel`, split
         between body and drawer arithmetically — the corner is not a
         motion boundary, so there's nothing to stutter on. Shadow + chip
         wait for the landing. */
      seg: { inner: [0, .30], travel: [.02, 1], face: [.28, 1] },
      at: { inked: .20, shadowed: .985, pulled: .55, fullish: .9 },
      restTrim: 72,     /* ~3/4" shaved off the resting marks, top and bottom */
      /* the lean: a board under inspection (lightbox open) makes the
         marks grow to full height and pull off the edge — the familiar
         line coming closer along with the board */
      lean: { x: 20, durIn: .6, durOut: .45 }
    };
    const bayDrawerEl = bay.querySelector(".bay-drawer");
    const bayCS = getComputedStyle(bay);
    const BAY_W = parseFloat(bayCS.getPropertyValue("--bayW")) || 340;
    const BAY_SLIVER = parseFloat(bayCS.getPropertyValue("--sliver")) || 62;
    const BAY_SLIDE = parseFloat(bayCS.getPropertyValue("--inner-slide")) || 46;
    let bayP = 0, bayLean = 0, bayLocked = false, bayClosing = false, bayPtr = null;
    let bayPosedP = -1, bayPosedL = -1;
    const segT = (p, s) => Math.min(1, Math.max(0, (p - s[0]) / (s[1] - s[0])));
    const ssBay = t => t * t * (3 - 2 * t);
    document.addEventListener("pointermove", e => { bayPtr = { x: e.clientX, y: e.clientY }; });

    function bayPose() {
      if (bayP === bayPosedP && bayLean === bayPosedL) return;
      bayPosedP = bayP; bayPosedL = bayLean;
      const e1 = segT(bayP, BAY_TUNE.seg.inner);              /* linear: the inner line never slows */
      const ef = ssBay(segT(bayP, BAY_TUNE.seg.face));
      const leanE = ssBay(bayLean);
      /* vertical: trimmed at rest, full card height when the drawer
         assembles OR a board is under inspection — whichever asks harder */
      const vi = 10 + BAY_TUNE.restTrim * (1 - Math.max(e1, leanE));
      bayInner.style.top = bayInner.style.bottom = vi.toFixed(1) + "px";
      /* one continuous horizontal journey (off-page → full pull), eased
         once, then split: the panel takes the first stretch (until its
         face reaches the sliver position), the drawer takes the rest */
      const bodyLeg = 10 + BAY_SLIVER;
      const D = (bodyLeg + BAY_W - BAY_SLIVER) * ssBay(segT(bayP, BAY_TUNE.seg.travel));
      const leanX = BAY_TUNE.lean.x * leanE * (1 - e1);       /* the lean yields to the drawer */
      bayInner.style.transform = "translateX(" + (-(BAY_SLIDE * e1) - leanX).toFixed(2) + "px)";
      bayPanel.style.transform = "translateX(" + ((BAY_W + 10) - Math.min(D, bodyLeg)).toFixed(2) + "px)";
      bayDrawerEl.style.transform = "translateX(" + (-Math.max(0, D - bodyLeg)).toFixed(2) + "px)";
      bay.style.setProperty("--rp", e1.toFixed(3));
      bay.style.setProperty("--fp", ef.toFixed(3));
      bay.classList.toggle("inked", bayP >= BAY_TUNE.at.inked);
      bay.classList.toggle("shadowed", bayP >= BAY_TUNE.at.shadowed);
      bay.classList.toggle("pulled", bayP >= BAY_TUNE.at.pulled);
      bay.classList.toggle("fullish", bayP >= BAY_TUNE.at.fullish);
      bay.classList.toggle("locked", bayLocked);
    }
    let bayLast = performance.now();
    function bayTick(now) {
      const dt = Math.min(.05, (now - bayLast) / 1000);
      bayLast = now;
      let rate;
      if (bayLocked) rate = 1 / BAY_TUNE.durSnap;
      else if (bayClosing) rate = -1 / BAY_TUNE.durClose;
      else {
        let near = false, closeness = 0;
        if (bayPtr) {
          const dist = innerWidth - bayPtr.x;
          near = dist < BAY_TUNE.trigger && bayPtr.y > innerHeight * .13 && bayPtr.y < innerHeight * .87;
          if (near) closeness = 1 - Math.max(0, dist) / BAY_TUNE.trigger;
        }
        /* speed ramp: linear across the first 3/4 of the zone, then a
           steeper curve near the absolute page edge */
        const ramp = closeness <= .75
          ? closeness * .8
          : .6 + .4 * Math.pow((closeness - .75) / .25, 2);
        rate = near
          ? 1 / (BAY_TUNE.durSlow + (BAY_TUNE.durFast - BAY_TUNE.durSlow) * ramp)
          : -1 / BAY_TUNE.durShut;
      }
      if (reduced) rate *= 60;   /* no slow theater under reduced motion */
      bayP = Math.min(1, Math.max(0, bayP + rate * dt));
      if (bayClosing && bayP === 0) bayClosing = false;
      /* the lean tracks the lightbox */
      let lr = lb.hidden ? -dt / BAY_TUNE.lean.durOut : dt / BAY_TUNE.lean.durIn;
      if (reduced) lr *= 60;
      bayLean = Math.min(1, Math.max(0, bayLean + lr));
      bayPose();
      requestAnimationFrame(bayTick);
    }
    requestAnimationFrame(bayTick);

    function openBay() { bayClosing = false; bayLocked = true; bayPosedP = -1; }
    function closeBay() { bayLocked = false; bayClosing = true; bayPosedP = -1; }
    bayPanel.addEventListener("click", openBay);
    bayPanel.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openBay(); }
    });
    document.getElementById("bay-close").addEventListener("click", e => {
      e.stopPropagation();   /* don't let the panel's own click re-lock it */
      closeBay();
    });
    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && bayP > 0 && lb.hidden && vlb.hidden) closeBay();
    });

    /* the flight: clone the board cutout and ride it into the bay on a
       rAF-driven arc — position, scale, rotation, and shadow all posed
       from one progress value (the drawer's own lesson: one master p,
       no seams). Open drawer: the real shelf item renders first (hidden,
       .preseat) and the flight lands on its MEASURED rect, so the clone
       becomes the item in the same frame — no crossfade, no guessed
       coordinates. The count chip holds until touchdown. Closed drawer:
       same arc to the resting dot, answered by the dot pulse.
       Seat variants (SEAT switcher, avrg-k-seat):
         drop     — peak hangs over the slot, falls the last 9px, whisper of squash
         skid     — shallow arc, overshoots 19px, friction drags it home
         seatdraw — the slot draws its seat line while the card is inbound */
    const SEAT_TUNE = {
      dur: .68,        /* flight seconds, open drawer */
      durDot: .5,      /* flight seconds to the resting dot */
      liftMax: 120,    /* arc height ceiling (lift scales with distance) */
      pickup: .07      /* early "picked up" grow, fades over the ride */
    };
    function bayFlight(src, sr, end, opts, onLand) {
      const fly = src.cloneNode();
      fly.className = "bay-fly";
      fly.style.left = sr.left + "px"; fly.style.top = sr.top + "px";
      fly.style.width = sr.width + "px"; fly.style.height = sr.height + "px";
      document.body.appendChild(fly);
      const sx = sr.left + sr.width / 2, sy = sr.top + sr.height / 2;
      const dist = Math.hypot(end.x - sx, end.y - sy);
      const lift = Math.min(SEAT_TUNE.liftMax, 40 + dist * .18) * (opts.shallow ? .5 : 1);
      /* control point: shallow arcs peak mid-route; steep ones hang the
         peak over the target so the last leg reads as a fall */
      const cx = opts.shallow ? (sx + end.x) / 2 : sx * .3 + end.x * .7;
      const cy = Math.min(sy, end.y) - lift;
      const s1 = end.h / sr.height;
      const t0 = performance.now(), dur = opts.dur * 1000;
      (function frame(now) {
        const t = Math.min(1, (now - t0) / dur);
        const e = 1 - Math.pow(1 - t, 2.6);   /* launched hard, arrives damped */
        const u = 1 - e;
        const px = u * u * sx + 2 * u * e * cx + e * e * end.x;
        const py = u * u * sy + 2 * u * e * cy + e * e * end.y;
        const sc = 1 + (s1 - 1) * e + SEAT_TUNE.pickup * Math.sin(Math.PI * Math.min(1, e / .5)) * u;
        const rot = 5 * Math.sin(Math.PI * e) + (opts.endRot || 0) * e;
        const f = 4 * e * u;                  /* altitude: peaks mid-flight, 0 at both ends */
        fly.style.transform = "translate(" + (px - sx).toFixed(1) + "px," + (py - sy).toFixed(1) + "px) scale(" + sc.toFixed(3) + ") rotate(" + rot.toFixed(2) + "deg)";
        fly.style.filter = "drop-shadow(" + (3 + 8 * f).toFixed(1) + "px " + (4 + 10 * f).toFixed(1) + "px 0 rgba(0,0,0," + (.3 - .08 * f).toFixed(3) + "))";
        if (t < 1) requestAnimationFrame(frame);
        else { fly.remove(); onLand(); }
      })(performance.now());
    }
    function flyToBay(cardEl, id) {
      const src = cardEl && cardEl.querySelector(".stage img, .frame img");
      if (reduced || !src) { renderBay(); return; }
      const sr = src.getBoundingClientRect();
      if (bayP <= .5) {
        /* closed: arc to the resting dot; the dot answers */
        const rr = bayDot.getBoundingClientRect();
        bayFlight(src, sr,
          { x: rr.left + rr.width / 2, y: rr.top + rr.height / 2, h: 18 },
          { dur: SEAT_TUNE.durDot }, () => {
            renderBay();
            bayInner.classList.add("pulse");
            bayInner.addEventListener("animationend", () => bayInner.classList.remove("pulse"), { once: true });
          });
        return;
      }
      pendingSeat.add(id);
      renderBay();   /* the item now exists, hidden — its rect is the target */
      const item = bay.querySelector('.bay-item.preseat[data-id="' + id + '"]');
      if (!item) { pendingSeat.delete(id); renderBay(); return; }
      const launch = () => {
        const tr = item.getBoundingClientRect();
        const skid = SEAT === "skid";
        const seatClass = skid ? "seat-skid" : (SEAT === "seatdraw" ? "seat-set" : "seat-drop");
        /* the flight ends exactly where the seat animation begins */
        const end = {
          x: tr.left + tr.width / 2 + (skid ? 19 : 0),
          y: tr.top + tr.height / 2 + (skid ? 0 : -9),
          h: tr.height
        };
        let seatline = null;
        if (SEAT === "seatdraw") {
          seatline = document.createElement("div");
          seatline.className = "bay-seatline";
          seatline.style.left = item.offsetLeft + "px";
          seatline.style.width = tr.width.toFixed(1) + "px";
          item.parentElement.appendChild(seatline);
          setTimeout(() => seatline.classList.add("drawn"), Math.round(SEAT_TUNE.dur * 1000 * .35));
        }
        bayFlight(src, sr, end, { dur: SEAT_TUNE.dur, shallow: skid, endRot: skid ? 2 : 0 }, () => {
          /* re-query: a renderBay may have rebuilt the shelves mid-flight */
          const seated = bay.querySelector('.bay-item.preseat[data-id="' + id + '"]');
          pendingSeat.delete(id);
          if (!seated) { updateBayCount(); if (seatline) seatline.remove(); return; }
          seated.classList.remove("preseat");
          seated.classList.add(seatClass);
          seated.addEventListener("animationend", () => seated.classList.remove(seatClass), { once: true });
          const shelf = seated.parentElement;
          shelf.classList.add("landed");
          setTimeout(() => shelf.classList.remove("landed"), 500);
          bayShelvesEl.classList.add("recoil");
          setTimeout(() => bayShelvesEl.classList.remove("recoil"), 250);
          updateBayCount();
          bayRef.classList.add("bump");
          setTimeout(() => bayRef.classList.remove("bump"), 350);
          if (seatline) {
            seatline.classList.add("done");
            setTimeout(() => seatline.remove(), 900);
          }
        });
      };
      if (item.complete && item.naturalWidth) launch();
      else item.addEventListener("load", launch, { once: true });
    }

    /* +List on belt/grid fv3 cards: capture phase, so the card's own
       "open the lightbox" click never sees it. The lightbox chip keeps
       its element handler (skipped by id here). */
    document.addEventListener("click", e => {
      const chip = e.target.closest && e.target.closest(".fc-list.d7f-cta");
      if (!chip || chip.id === "lb-fv3-list") return;
      const id = chip.dataset.id;
      if (!id) return;
      e.stopPropagation(); e.preventDefault();
      const adding = !inLisst(id);
      toggleLisst(id);
      document.querySelectorAll('.fc-list[data-id="' + id + '"] .ft').forEach(t => {
        t.textContent = inLisst(id) ? "✓ Lisst" : "+ List";
      });
      if (adding) {
        if (dockActive()) dockAdd(id, chip.closest(".d7f"));
        else flyToBay(chip.closest(".d7f"), id);
      } else renderBay();
    }, true);

    renderBay();

    route();
  })();
  </script>
</body>
</html>
