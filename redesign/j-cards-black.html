<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AVRG — J: cards in context (black)</title>
<!-- Exploration: the winning card-lab treatments dropped into the real site frame
     (topbar + shop-all collection sections, live data.js boards, batch cutouts from
     card-lab/cuts/). Twin page: j-cards-white.html. Serve from repo root (:8123). -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  @font-face {
    font-family: "Satoshi";
    src: url("../site/fonts/Satoshi-Black.otf") format("opentype");
    font-weight: 900;
    font-style: normal;
    font-display: swap;
  }
  :root {
    --bg: #000;
    --bone: #ddd1b6;
    --ink: #201a15;
    --soft: #c7bda4;
    --hint: #a29a89;
    --disp: "Bricolage Grotesque", -apple-system, sans-serif;
    --mono: "Space Mono", ui-monospace, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--bone);
    font-family: var(--disp); -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  ::selection { background: var(--bone); color: var(--ink); }
  img { display: block; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  .label {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: .22em; text-transform: uppercase;
  }

  /* ---- topbar: straight from h-blackout ---- */
  .topbar {
    position: sticky; top: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    gap: clamp(14px, 2.6vw, 30px);
    padding: 14px clamp(18px, 3vw, 40px);
    background: rgba(0, 0, 0, .86);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    border-bottom: 1px solid #1c1c1c;
  }
  .topbar .tab {
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase;
    color: #fff; border: 2px solid #fff; border-radius: 8px;
    padding: 10px 14px;
    transition: background .15s ease, color .15s ease;
  }
  .topbar .tab:hover { background: #fff; color: #000; }
  .bar-brand { position: absolute; left: clamp(18px, 3vw, 40px); display: flex; align-items: center; }
  .bar-brand img { width: 38px; height: 38px; border-radius: 50%; }
  .dm-mini {
    position: absolute; right: clamp(18px, 3vw, 40px);
    background: transparent; color: #fff;
    border: 2px solid #fff; border-radius: 8px;
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase;
    padding: 10px 14px;
    transition: background .15s ease, color .15s ease;
  }
  .dm-mini.glitch-run {
    animation: dm-glitch .26s steps(1, end) 1;
    background: #fff; color: #000;
  }
  @keyframes dm-glitch {
    0%   { transform: translate(2px, -1px) skewX(-6deg); clip-path: inset(0 0 44% 0); }
    33%  { transform: translate(-2px, 1px) skewX(4deg);  clip-path: inset(52% 0 0 0); }
    66%  { transform: translate(1px, 0);                 clip-path: inset(14% 0 26% 0); }
    100% { transform: none; clip-path: none; }
  }

  /* ---- sections: shop-all layout from the blackout draft ---- */
  .colpage-inner { text-align: center; padding: clamp(36px, 6vh, 64px) 0 0; max-width: 1240px; margin: 0 auto; }
  .colpage-inner h2 {
    display: inline-block; color: #fff;
    font-family: "Satoshi", var(--disp);
    font-weight: 900; text-transform: uppercase; letter-spacing: -0.025em; line-height: 1.04;
    font-size: clamp(34px, 6vw, 68px); padding: 0 16px;
  }
  .colpage-inner h2 .hl { color: #fff; }
  .colpage-inner .desc {
    max-width: 52ch; margin: 18px auto 0; padding: 0 20px;
    font-size: 15px; font-weight: 500; line-height: 1.8; color: var(--soft);
  }
  .pagehead { text-align: center; padding: clamp(28px, 5vh, 48px) 20px 0; }
  .pagehead .note { margin-top: 10px; font-size: 12.5px; font-style: italic; color: var(--hint); }

  .cgrid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(262px, 1fr));
    gap: 54px 34px; justify-items: center;
    padding: clamp(30px, 5vh, 52px) clamp(20px, 5vw, 64px) 30px;
  }

  /* ---- shared card atoms (from card-lab) ---- */
  .wchip {
    display: inline-block;
    font-family: var(--mono); font-size: 8.5px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
    background: #fff; color: #000; border: none; border-radius: 0;
    padding: 5px 8px;
  }
  button.wchip { cursor: pointer; letter-spacing: .16em; padding: 6px 10px; transition: background .15s ease, color .15s ease; }
  button.wchip:hover { background: #000; color: #fff; box-shadow: 0 0 0 1.5px #fff; }
  .st {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 8.5px; font-weight: 700;
    letter-spacing: .2em; text-transform: uppercase;
  }
  .st .dot { width: 7px; height: 7px; border-radius: 50%; }
  .st.avail .dot { background: #58a852; }
  .st.avail { color: #58a852; }
  .st.pend .dot { background: #c98a12; animation: pulse 1.6s ease-in-out infinite; }
  .st.pend { color: #c98a12; }
  .st.gone .dot { background: #8b8175; }
  .st.gone { color: #8b8175; }
  @keyframes pulse { 50% { opacity: .35; } }
  .spark { color: #d8511f; font-size: 12px; line-height: 1; cursor: help; }

  /* ---- the d5 slab family ---- */
  .d5 { width: 262px; cursor: pointer; }
  .d5 .panel {
    border-radius: 6px; background: #0b0b0b; overflow: hidden;
    box-shadow: 7px 9px 0 -1px rgba(255, 255, 255, .07), 7px 9px 0 0 rgba(0, 0, 0, .9);
    transition: box-shadow .22s ease;
  }
  .d5:hover .panel { box-shadow: 12px 15px 0 -1px rgba(255, 255, 255, .09), 12px 15px 0 0 rgba(0, 0, 0, .9); }
  .d5 .stage {
    position: relative; height: 250px;
    display: flex; align-items: center; justify-content: center;
  }
  .d5 .stage img {
    max-height: 214px; max-width: 86%; width: auto; height: auto;
    filter: drop-shadow(7px 9px 0 rgba(0, 0, 0, .6));
    transition: transform .22s ease, filter .22s ease;
  }
  .d5:hover .stage img {
    transform: scale(1.07);
    filter: drop-shadow(11px 14px 0 rgba(0, 0, 0, .6));
  }
  .d5 .info { padding: 11px 13px 13px; color: #fff; }
  .d5 .r1 { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .d5 .nm { font-size: 11.5px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; }
  .d5 .dims {
    margin-top: 5px; font-family: var(--mono); font-size: 8px;
    letter-spacing: .18em; text-transform: uppercase; color: #9a9a9a;
  }
  .d5 .r2 {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 9px; padding-top: 9px; border-top: 1.5px solid rgba(255, 255, 255, .18);
  }
  .d5.sq .info { border-top: 2px solid #2a2a2a; }
  .d5 .corner {
    position: absolute; top: 12px; left: 12px; z-index: 2;
    display: flex; align-items: center; gap: 7px;
  }
  .d5.spread .info { text-align: center; padding-top: 0; }
  .d5.spread .nm { display: block; }
  .d5.spread .dims { color: #fff; margin-top: 6px; }
  .d5.spread .r2 { border-top: 0; padding-top: 0; margin-top: 12px; }
  /* sold: card keeps its spot, steps back */
  .d5.sold { opacity: .55; }
  .d5.sold .stage img { filter: grayscale(.7) drop-shadow(7px 9px 0 rgba(0, 0, 0, .4)); }
  .d5.sold:hover .stage img { transform: none; }
  .d5.sold .rfline, .d5.sold .wchip.rfc { text-decoration: line-through; }

  /* v-white: white border defines the card */
  .v-white .panel { border: 2px solid #fff; }

  /* d6z zoned: grey plate stage inside a white-bordered black card */
  .d6z .panel { border: 2px solid #fff; background: #0b0b0b; }
  .d6z .plate { background: #a49d92; }
  .d6z .plate .nm { display: block; text-align: center; color: #16120e; padding-bottom: 15px; letter-spacing: .13em; }
  .d6z .plate .stage img { filter: drop-shadow(7px 9px 0 rgba(22, 18, 14, .45)); }
  .d6z:hover .plate .stage img { filter: drop-shadow(11px 14px 0 rgba(22, 18, 14, .45)); }
  .d6z.sold .plate .stage img { filter: grayscale(.7) drop-shadow(7px 9px 0 rgba(22, 18, 14, .3)); }
  .d6z .info { padding-top: 12px; }
  .d6z .corner .wchip { box-shadow: 0 0 0 1.5px #16120e; }

  /* d7: the ⸺ · ⸺ frame — gap closes onto the dot on hover */
  .d7 .panel { position: relative; background: #0b0b0b; }
  .d7 .inframe { position: absolute; inset: 10px; z-index: 1; pointer-events: none; }
  .d7 .inframe::before, .d7 .inframe::after {
    content: ""; position: absolute; left: 0; width: calc(100% - 4px);
    height: 41%; border: 2px solid #fff;
    transition: height .28s ease;
  }
  .d7 .inframe::before { top: 0; border-bottom: 0; }
  .d7 .inframe::after { bottom: 0; border-top: 0; }
  .d7:hover .inframe::before, .d7:hover .inframe::after { height: calc(50% - 6px); }
  .d7 .dgl, .d7 .dgr {
    position: absolute; top: 50%; width: 5px; height: 5px; border-radius: 50%;
    background: #fff; transform: translateY(-50%);
  }
  .d7 .dgl { left: -1.5px; }
  .d7 .dgr { right: -1.5px; }
  .d7 .inframe .ctl, .d7 .inframe .cbr { position: absolute; display: block; }
  .d7 .inframe .ctl { width: 4px; height: 4px; top: -1px; left: -1px; background: #fff; }
  .d7 .inframe .cbr { width: 6px; height: 6px; bottom: -1px; right: -1px; background: #FF4655; }
  .d7 .corner { top: 16px; left: 16px; }
  .d7a .panel { border: 1.5px solid #fff; }
  .d7a .stage { height: 244px; }
  .d7a .info { position: relative; z-index: 0; padding: 0 28px 24px; }
  .d7b .stage { height: 326px; }
  .d7b .stage img { max-height: 246px; max-width: 74%; }
  .d7b .dimtr {
    position: absolute; top: 18px; right: 18px; z-index: 2;
    font-family: var(--mono); font-size: 8px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase; color: #fff;
  }
  .d7b .blist { position: absolute; bottom: 16px; right: 16px; z-index: 2; }
  .d7b .stbr { position: absolute; bottom: 25px; left: 28px; z-index: 2; }

  /* ---- switcher ---- */
  .switch {
    position: fixed; right: 18px; bottom: 18px; z-index: 2000;
    display: flex; flex-direction: column; gap: 7px; align-items: flex-end;
    background: rgba(0, 0, 0, .82); border: 1px solid #2a2a2a; border-radius: 10px;
    padding: 12px 12px 12px 14px;
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  }
  .switch .swhead { color: var(--hint); font-size: 8.5px; margin-bottom: 3px; }
  .switch .swbtn {
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    letter-spacing: .16em; text-transform: uppercase;
    color: #fff; border: 1.5px solid #555; border-radius: 6px;
    padding: 6px 10px;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .switch .swbtn:hover { border-color: #fff; }
  .switch .swbtn.on { background: #fff; color: #000; border-color: #fff; }
  .switch .twin { margin-top: 6px; color: var(--hint); font-size: 8.5px; letter-spacing: .16em; }
  .switch .twin:hover { color: #fff; }

  .foot { text-align: center; padding: 40px 20px 70px; color: var(--hint); font-size: 12.5px; font-style: italic; }
</style>
</head>
<body>
  <header class="topbar">
    <div class="bar-brand"><img src="../site/img/logo-line-white.png" alt="AVRG" /></div>
    <nav id="topnav" style="display:contents"></nav>
    <a class="dm-mini" id="nav-dm" href="#" target="_blank" rel="noopener">Contact me</a>
  </header>

  <div class="pagehead">
    <span class="label" style="color:#fff">Cards in context · black ground</span>
    <p class="note">real collections, batch cutouts (39/39) — dims &amp; statuses are placeholder demo data</p>
  </div>

  <main id="secs"></main>

  <p class="foot">CL 3 shows sold, HS 2 shows pending, CL 5 &amp; the OG Orange wear the builder's mark — demo states, not real</p>

  <div class="switch">
    <span class="swhead label">Card style</span>
    <div id="swbtns" style="display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-end;max-width:260px"></div>
    <a class="twin label" href="j-cards-white.html">→ white ground</a>
  </div>

  <script src="../site/data.js"></script>
  <script>
  (function () {
    "use strict";
    const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));
    const CUT = b => "card-lab/cuts/" + b.thumb.split("/").pop().replace(/\.jpg$/, "") + "-cut.png";

    const SHORT = { originals: "Original", "hand-shaped": "Shaped", classic: "Routed" };
    const CARDNM = { "hand-shaped": "Shaped", classic: "Classic" };
    const PRE = { originals: "OG", "hand-shaped": "HS", classic: "CL" };
    const SUB = {
      originals: "no mold, lots of clamping and a little luck",
      "hand-shaped": "hand shaped, nfb mold pressed",
      classic: "router shaped, nfb mold pressed"
    };
    const DIMS = {
      originals: "ORIGINAL · ONE OF ONE",
      "hand-shaped": "HAND-SHAPED · ONE OF ONE",
      classic: "33.5 × 96 MM · MED KICK"
    };
    /* demo states, mirroring the lab examples */
    const SPARK = { "CL 5": 1, "OG 1": 1 };
    const PEND = { "HS 2": 1 };
    const GONE = { "CL 3": 1 };

    const dispTitle = c => c.title.replace(/\s*-\s*Completes/i, "").replace(/ - /g, " ");
    const titleHtml = c => {
      const words = dispTitle(c).split(" ");
      const last = words.pop();
      return esc(words.join(" ")) + (words.length ? " " : "") + '<span class="hl">' + esc(last) + '</span>';
    };
    const cleanDesc = s => (s || "").replace(/ Hover.*$/, "");

    function meta(c, b, k) {
      const ref = b.ref || PRE[c.id] + " " + (k + 1);
      return {
        ref,
        nm: b.name || CARDNM[c.id] || SHORT[c.id],
        img: CUT(b),
        dims: DIMS[c.id],
        spark: !!SPARK[ref],
        st: GONE[ref] ? "gone" : (PEND[ref] ? "pend" : "avail"),
        stTxt: GONE[ref] ? "Sold" : (PEND[ref] ? "Pending" : "Available")
      };
    }
    const stHtml = m => '<span class="st ' + m.st + '"><span class="dot"></span>' + m.stTxt + '</span>';
    const listBtn = m => m.st === "gone" ? "" : '<button class="wchip">+ List</button>';
    const sparkHtml = m => m.spark ? ' <span class="spark" title="Builder\'s mark — this one came out perfect">✱</span>' : "";
    const soldCls = m => m.st === "gone" ? " sold" : "";
    const cornerHtml = m => '<div class="corner"><span class="wchip rfc">' + esc(m.ref) + '</span>' + sparkHtml(m) + '</div>';

    /* ---- treatments ---- */
    const T = {
      slab: {
        nm: "Slab", why: "black slab, divider, chip ref right",
        card: m =>
          '<div class="d5 sq' + soldCls(m) + '"><div class="panel">' +
            '<div class="stage"><img loading="lazy" src="' + m.img + '" alt="' + esc(m.nm) + '"></div>' +
            '<div class="info">' +
              '<div class="r1"><span class="nm">' + esc(m.nm) + sparkHtml(m) + '</span><span class="wchip rfc">' + esc(m.ref) + '</span></div>' +
              '<div class="dims">' + m.dims + '</div>' +
              '<div class="r2">' + stHtml(m) + listBtn(m) + '</div>' +
            '</div>' +
          '</div></div>'
      },
      spread: {
        nm: "Spread", why: "chip rides the corner, centered caption, no dividers",
        card: m =>
          '<div class="d5 spread' + soldCls(m) + '"><div class="panel">' +
            '<div class="stage">' + cornerHtml(m) +
              '<img loading="lazy" src="' + m.img + '" alt="' + esc(m.nm) + '"></div>' +
            '<div class="info">' +
              '<span class="nm">' + esc(m.nm) + '</span>' +
              '<div class="dims">' + m.dims + '</div>' +
              '<div class="r2">' + stHtml(m) + listBtn(m) + '</div>' +
            '</div>' +
          '</div></div>'
      },
      border: {
        nm: "Border", why: "spread + white border holds the edge",
        card: m =>
          '<div class="d5 spread v-white' + soldCls(m) + '"><div class="panel">' +
            '<div class="stage">' + cornerHtml(m) +
              '<img loading="lazy" src="' + m.img + '" alt="' + esc(m.nm) + '"></div>' +
            '<div class="info">' +
              '<span class="nm">' + esc(m.nm) + '</span>' +
              '<div class="dims">' + m.dims + '</div>' +
              '<div class="r2">' + stHtml(m) + listBtn(m) + '</div>' +
            '</div>' +
          '</div></div>'
      },
      zoned: {
        nm: "Zoned", why: "grey plate stage, black service zone below",
        card: m =>
          '<div class="d5 spread d6z' + soldCls(m) + '"><div class="panel">' +
            '<div class="plate">' +
              '<div class="stage">' + cornerHtml(m) +
                '<img loading="lazy" src="' + m.img + '" alt="' + esc(m.nm) + '"></div>' +
              '<span class="nm">' + esc(m.nm) + '</span>' +
            '</div>' +
            '<div class="info">' +
              '<div class="dims">' + m.dims + '</div>' +
              '<div class="r2">' + stHtml(m) + listBtn(m) + '</div>' +
            '</div>' +
          '</div></div>'
      },
      frame: {
        nm: "⸺·⸺ frame", why: "the logo frame; hover closes the gap onto the dot",
        card: m =>
          '<div class="d5 spread d7 d7a' + soldCls(m) + '"><div class="panel">' +
            '<div class="inframe"><i class="ctl"></i><i class="cbr"></i><i class="dgl"></i><i class="dgr"></i></div>' +
            '<div class="stage">' + cornerHtml(m) +
              '<img loading="lazy" src="' + m.img + '" alt="' + esc(m.nm) + '"></div>' +
            '<div class="info">' +
              '<span class="nm">' + esc(m.nm) + '</span>' +
              '<div class="dims">' + m.dims + '</div>' +
              '<div class="r2">' + stHtml(m) + listBtn(m) + '</div>' +
            '</div>' +
          '</div></div>'
      },
      framemin: {
        nm: "Frame min", why: "no outer box, info stripped to the corners",
        card: m =>
          '<div class="d5 d7 d7b' + soldCls(m) + '"><div class="panel">' +
            '<div class="inframe"><i class="ctl"></i><i class="cbr"></i><i class="dgl"></i><i class="dgr"></i></div>' +
            '<span class="dimtr">' + m.dims + '</span>' +
            '<div class="stage">' + cornerHtml(m) +
              '<img loading="lazy" src="' + m.img + '" alt="' + esc(m.nm) + '"></div>' +
            (m.st === "gone" ? "" : '<button class="wchip blist">+ List</button>') +
            '<span class="stbr">' + stHtml(m) + '</span>' +
          '</div></div>'
      }
    };

    const COLS = COLLECTIONS.filter(c => c.boards.length);

    document.getElementById("topnav").innerHTML = COLS.map(c =>
      '<a class="tab" href="#' + c.id + '">' + esc(SHORT[c.id] || c.title) + '</a>').join("");

    const handle = (typeof CONTACT === "object" && CONTACT && CONTACT.reddit) || "u/avrg";
    document.getElementById("nav-dm").href =
      "https://www.reddit.com/message/compose/?to=" + encodeURIComponent(handle.replace(/^\/?u\//i, ""));

    const secs = document.getElementById("secs");
    function render(key) {
      const t = T[key];
      secs.innerHTML = COLS.map(c =>
        '<section class="colpage-inner" id="' + c.id + '">' +
          '<h2>' + titleHtml(c) + '</h2>' +
          '<p class="desc">' + esc(cleanDesc(c.description)) + '</p>' +
          '<div class="cgrid">' +
            c.boards.map((b, k) => t.card(meta(c, b, k))).join("") +
          '</div>' +
        '</section>'
      ).join("");
      document.querySelectorAll(".swbtn").forEach(x => x.classList.toggle("on", x.dataset.t === key));
      if (location.hash.replace(/^#s-/, "") !== key) history.replaceState(null, "", "#s-" + key);
    }

    document.getElementById("swbtns").innerHTML = Object.keys(T).map(k =>
      '<button class="swbtn" data-t="' + k + '" title="' + esc(T[k].why) + '">' + T[k].nm + '</button>').join("");
    document.getElementById("swbtns").addEventListener("click", e => {
      const b = e.target.closest(".swbtn");
      if (b) render(b.dataset.t);
    });

    const initial = (location.hash.match(/^#s-(\w+)/) || [])[1];
    render(T[initial] ? initial : "spread");

    /* quiet decode on tab hover — the site signature rides along */
    const GLYPHS = "#%&?{}<>*+=/";
    const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const canHover = matchMedia("(hover: hover)").matches;
    if (!reduced && canHover) document.addEventListener("pointerover", e => {
      const btn = e.target.closest && e.target.closest(".tab");
      if (!btn || btn.dataset.decoding) return;
      const chars = [...btn.textContent];
      if (!chars.length || chars.length > 40) return;
      btn.dataset.decoding = "1";
      const resolveAt = chars.map((c, i) => i * 0.4 + 1 + Math.random() * 2.2);
      let f = 0;
      const t = setInterval(() => {
        f++;
        let out = "", done = true;
        for (let i = 0; i < chars.length; i++) {
          if (!/\S/.test(chars[i])) { out += chars[i]; continue; }
          if (f >= resolveAt[i]) { out += chars[i]; }
          else { out += GLYPHS[(Math.random() * GLYPHS.length) | 0]; done = false; }
        }
        btn.textContent = out;
        if (done) { clearInterval(t); delete btn.dataset.decoding; }
      }, 30);
    });
    if (!reduced && canHover) {
      document.addEventListener("pointerover", e => {
        const btn = e.target.closest && e.target.closest(".dm-mini");
        if (!btn || btn.classList.contains("glitch-run")) return;
        if (btn.contains(e.relatedTarget)) return;
        btn.classList.add("glitch-run");
      });
      document.addEventListener("animationend", e => {
        if (e.animationName === "dm-glitch") e.target.classList.remove("glitch-run");
      });
    }
  })();
  </script>
</body>
</html>
